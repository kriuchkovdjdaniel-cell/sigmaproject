<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Snake - Danya</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, Helvetica, sans-serif;
        background: #111827;
        color: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(20, 184, 166, 0.28), transparent 32rem),
          linear-gradient(135deg, #111827 0%, #172033 55%, #0f172a 100%);
      }

      main {
        width: min(92vw, 620px);
        display: grid;
        gap: 1rem;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 1rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 9vw, 4.5rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .scoreboard {
        display: flex;
        gap: 0.75rem;
        font-weight: 700;
      }

      .scoreboard[hidden] {
        display: none;
      }

      .stat {
        min-width: 5rem;
        padding: 0.65rem 0.75rem;
        border: 1px solid rgba(248, 250, 252, 0.2);
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.72);
        text-align: center;
      }

      .stat span {
        display: block;
        margin-top: 0.15rem;
        color: #5eead4;
        font-size: 1.35rem;
      }

      .game {
        position: relative;
        display: grid;
        gap: 0.9rem;
      }

      .play-overlay {
        position: absolute;
        inset: 0 0 auto;
        aspect-ratio: 1;
        display: none;
        place-items: center;
        padding: 1rem;
        border-radius: 8px;
        background: rgba(2, 6, 23, 0.64);
      }

      .play-overlay.open {
        display: grid;
      }

      .play-panel {
        width: min(74vw, 260px);
        display: grid;
        gap: 0.75rem;
        text-align: center;
      }

      .play-panel h2 {
        margin: 0;
        font-size: 1.75rem;
      }

      .play-panel p {
        margin: 0;
        color: #cbd5e1;
        font-weight: 800;
      }

      canvas {
        width: 100%;
        aspect-ratio: 1;
        display: block;
        border: 2px solid rgba(248, 250, 252, 0.22);
        border-radius: 8px;
        background: #020617;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
      }

      .controls {
        display: flex;
        justify-content: space-between;
        gap: 0.75rem;
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 8px;
        padding: 0.7rem 0.95rem;
        background: #14b8a6;
        color: #042f2e;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
      }

      button:hover {
        background: #2dd4bf;
      }

      button.selected {
        outline: 3px solid #f97316;
        outline-offset: 2px;
      }

      .pad {
        width: min(72vw, 240px);
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.45rem;
      }

      .pad button {
        aspect-ratio: 1.25;
        padding: 0;
        background: rgba(248, 250, 252, 0.12);
        color: #f8fafc;
      }

      .pad button:hover {
        background: rgba(248, 250, 252, 0.2);
      }

      .pad .up {
        grid-column: 2;
      }

      .pad .left {
        grid-column: 1;
      }

      .pad .down {
        grid-column: 2;
      }

      .pad .right {
        grid-column: 3;
      }

      .status {
        min-height: 1.5rem;
        margin: 0;
        color: #cbd5e1;
        text-align: center;
        font-weight: 700;
      }

      .pause-menu {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 1rem;
        background: rgba(2, 6, 23, 0.74);
        opacity: 0;
        pointer-events: none;
        transition: opacity 160ms ease;
      }

      .pause-menu.open {
        opacity: 1;
        pointer-events: auto;
      }

      .pause-panel {
        width: min(88vw, 320px);
        display: grid;
        gap: 0.75rem;
        padding: 1rem;
        border: 1px solid rgba(248, 250, 252, 0.18);
        border-radius: 8px;
        background: #111827;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
      }

      .pause-panel h2 {
        margin: 0 0 0.25rem;
        font-size: 1.5rem;
        text-align: center;
      }

      .game-options {
        display: none;
        gap: 0.75rem;
      }

      .game-options.open {
        display: grid;
      }

      .game-list {
        display: none;
        gap: 0.75rem;
      }

      .game-list.open {
        display: grid;
      }

      .room-form {
        display: grid;
        gap: 0.75rem;
      }

      input,
      select {
        width: 100%;
        min-height: 44px;
        border: 1px solid rgba(248, 250, 252, 0.22);
        border-radius: 8px;
        padding: 0.7rem 0.95rem;
        background: #020617;
        color: #f8fafc;
        font: inherit;
        font-weight: 700;
        text-align: center;
        text-transform: uppercase;
      }

      .room-code {
        min-height: 1.4rem;
        margin: 0;
        color: #5eead4;
        text-align: center;
        font-weight: 800;
      }

      .room-note {
        min-height: 1.4rem;
        margin: 0;
        color: #cbd5e1;
        text-align: center;
        font-size: 0.95rem;
        font-weight: 700;
      }

      .account-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        color: #cbd5e1;
        font-weight: 800;
      }

      .account-bar button {
        min-height: 36px;
        padding: 0.45rem 0.75rem;
      }

      .auth-menu {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: none;
        place-items: center;
        padding: 1rem;
        background: rgba(2, 6, 23, 0.84);
      }

      .auth-menu.open {
        display: grid;
      }

      .auth-panel {
        width: min(88vw, 360px);
        display: grid;
        gap: 0.75rem;
        padding: 1rem;
        border: 1px solid rgba(248, 250, 252, 0.18);
        border-radius: 8px;
        background: #111827;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
      }

      .auth-panel h2 {
        margin: 0 0 0.25rem;
        text-align: center;
      }

      .auth-panel input {
        text-transform: none;
      }

      .auth-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }

      .admin-panel {
        display: none;
        gap: 0.75rem;
        padding: 1rem;
        border: 1px solid rgba(248, 250, 252, 0.18);
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.72);
      }

      .admin-panel.open {
        display: grid;
      }

      .admin-panel h2 {
        margin: 0;
        font-size: 1.25rem;
      }

      .admin-stats {
        display: grid;
        gap: 0.4rem;
        color: #cbd5e1;
        font-weight: 800;
      }

      .admin-users {
        max-height: 8rem;
        overflow: auto;
        display: grid;
        gap: 0.35rem;
        color: #f8fafc;
        font-weight: 700;
      }

      .admin-points {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 0.75rem;
      }

      .admin-points select {
        text-transform: none;
      }

      @media (max-width: 560px) {
        header {
          align-items: stretch;
          flex-direction: column;
        }

        .scoreboard {
          justify-content: space-between;
        }

        .stat {
          flex: 1;
        }

        .admin-points {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="account-bar">
        <span id="accountStatus">Not logged in</span>
        <button type="button" id="logoutButton" hidden>Log out</button>
      </div>

      <section class="admin-panel" id="adminPanel" aria-label="Admin panel">
        <h2>Admin Panel</h2>
        <div class="admin-stats">
          <span id="adminRoomCount">Rooms: 0</span>
        </div>
        <div class="admin-points">
          <select id="pointsTargetSelect" aria-label="Points target">
            <option value="local">Current game</option>
          </select>
          <input id="pointsInput" type="number" min="1" value="1" aria-label="Points amount">
          <button type="button" id="addPointsButton">Add Points</button>
        </div>
        <button type="button" id="refreshAdminButton">Refresh</button>
        <button type="button" id="clearRoomsButton">Clear Rooms</button>
        <p class="room-note" id="adminMessage"></p>
      </section>

      <header>
        <h1 id="gameTitle">Snake</h1>
        <div class="scoreboard" id="localScoreboard" aria-label="Scoreboard">
          <div class="stat">Score <span id="score">0</span></div>
          <div class="stat">Best <span id="best">0</span></div>
        </div>
        <div class="scoreboard" id="onlineScoreboard" aria-label="Online scoreboard" hidden>
          <div class="stat"><strong id="playerOneName">P1</strong><span id="playerOneScore">0</span></div>
          <div class="stat"><strong id="playerTwoName">P2</strong><span id="playerTwoScore">0</span></div>
        </div>
      </header>

      <section class="game" aria-label="Snake game">
        <canvas id="board" width="560" height="560"></canvas>
        <div class="play-overlay" id="playOverlay" aria-hidden="true">
          <div class="play-panel">
            <h2 id="playTitle">Snake</h2>
            <p id="playMessage"></p>
            <button type="button" id="playButton">Play</button>
            <button type="button" id="cancelWaitButton" hidden>Leave Room</button>
          </div>
        </div>
        <p class="status" id="status">Use arrow keys or WASD to play.</p>
        <div class="controls">
          <button type="button" id="restart">Restart</button>
          <button type="button" id="shootButton">Shoot</button>
          <button type="button" id="pause">Pause</button>
        </div>
        <div class="pad" aria-label="Touch controls">
          <button type="button" class="up" data-direction="up" aria-label="Move up">Up</button>
          <button type="button" class="left" data-direction="left" aria-label="Move left">Left</button>
          <button type="button" class="down" data-direction="down" aria-label="Move down">Down</button>
          <button type="button" class="right" data-direction="right" aria-label="Move right">Right</button>
        </div>
      </section>
    </main>

    <div class="pause-menu" id="pauseMenu" aria-hidden="true">
      <div class="pause-panel" role="dialog" aria-modal="true" aria-labelledby="pauseTitle">
        <h2 id="pauseTitle">Paused</h2>
        <button type="button" id="resume">Resume</button>
        <button type="button" id="leaveRoom" hidden>Leave Room</button>
        <button type="button" id="back" hidden>Back</button>
        <button type="button" id="games">Games</button>
        <div class="game-options" id="gameOptions" aria-label="Game modes">
          <button type="button" id="singlePlayer">Single Player</button>
          <button type="button" id="online">Online</button>
        </div>
        <div class="game-list" id="singlePlayerGames" aria-label="Single player games">
          <button type="button" id="snakeClassic">Snake Classic</button>
          <button type="button" id="appleCatcher">Apple Catcher</button>
        </div>
        <div class="game-list" id="onlineGames" aria-label="Online games">
          <button type="button" class="selected" data-online-game="online-snake">Online Snake</button>
          <button type="button" data-online-game="online-tanks">Online Tanks</button>
          <button type="button" id="createRoom">Create Room</button>
          <div class="room-form">
            <input id="roomCodeInput" type="text" maxlength="8" placeholder="Room code" aria-label="Room code">
            <button type="button" id="joinRoom">Join Room</button>
          </div>
          <p class="room-code" id="roomCode"></p>
          <p class="room-note" id="roomNote"></p>
        </div>
      </div>
    </div>

    <div class="auth-menu" id="authMenu" aria-hidden="true">
      <div class="auth-panel" role="dialog" aria-modal="true" aria-labelledby="authTitle">
        <h2 id="authTitle">Account</h2>
        <input id="usernameInput" type="text" maxlength="18" placeholder="Username" autocomplete="username">
        <input id="passwordInput" type="password" maxlength="32" placeholder="Password" autocomplete="current-password">
        <div class="auth-actions">
          <button type="button" id="loginButton">Log in</button>
          <button type="button" id="registerButton">Register</button>
        </div>
        <p class="room-note" id="authMessage"></p>
      </div>
    </div>

    <script>
      const canvas = document.getElementById("board");
      const ctx = canvas.getContext("2d");
      const gameTitle = document.getElementById("gameTitle");
      const playOverlay = document.getElementById("playOverlay");
      const playTitle = document.getElementById("playTitle");
      const playMessage = document.getElementById("playMessage");
      const playButton = document.getElementById("playButton");
      const cancelWaitButton = document.getElementById("cancelWaitButton");
      const scoreEl = document.getElementById("score");
      const bestEl = document.getElementById("best");
      const localScoreboard = document.getElementById("localScoreboard");
      const onlineScoreboard = document.getElementById("onlineScoreboard");
      const playerOneNameEl = document.getElementById("playerOneName");
      const playerOneScoreEl = document.getElementById("playerOneScore");
      const playerTwoNameEl = document.getElementById("playerTwoName");
      const playerTwoScoreEl = document.getElementById("playerTwoScore");
      const accountStatus = document.getElementById("accountStatus");
      const logoutButton = document.getElementById("logoutButton");
      const adminPanel = document.getElementById("adminPanel");
      const adminRoomCount = document.getElementById("adminRoomCount");
      const pointsTargetSelect = document.getElementById("pointsTargetSelect");
      const pointsInput = document.getElementById("pointsInput");
      const addPointsButton = document.getElementById("addPointsButton");
      const refreshAdminButton = document.getElementById("refreshAdminButton");
      const clearRoomsButton = document.getElementById("clearRoomsButton");
      const adminMessage = document.getElementById("adminMessage");
      const authMenu = document.getElementById("authMenu");
      const usernameInput = document.getElementById("usernameInput");
      const passwordInput = document.getElementById("passwordInput");
      const loginButton = document.getElementById("loginButton");
      const registerButton = document.getElementById("registerButton");
      const authMessage = document.getElementById("authMessage");
      const statusEl = document.getElementById("status");
      const restartButton = document.getElementById("restart");
      const shootButton = document.getElementById("shootButton");
      const pauseButton = document.getElementById("pause");
      const pauseMenu = document.getElementById("pauseMenu");
      const resumeButton = document.getElementById("resume");
      const leaveRoomButton = document.getElementById("leaveRoom");
      const backButton = document.getElementById("back");
      const gamesButton = document.getElementById("games");
      const gameOptions = document.getElementById("gameOptions");
      const singlePlayerButton = document.getElementById("singlePlayer");
      const onlineButton = document.getElementById("online");
      const singlePlayerGames = document.getElementById("singlePlayerGames");
      const onlineGames = document.getElementById("onlineGames");
      const snakeClassicButton = document.getElementById("snakeClassic");
      const appleCatcherButton = document.getElementById("appleCatcher");
      const createRoomButton = document.getElementById("createRoom");
      const joinRoomButton = document.getElementById("joinRoom");
      const roomCodeInput = document.getElementById("roomCodeInput");
      const roomCodeEl = document.getElementById("roomCode");
      const roomNoteEl = document.getElementById("roomNote");
      const onlineGameButtons = document.querySelectorAll("[data-online-game]");
      const gridSize = 20;
      const tileCount = canvas.width / gridSize;
      const startSnake = [
        { x: 8, y: 10 },
        { x: 7, y: 10 },
        { x: 6, y: 10 }
      ];
      const games = {
        snake: {
          title: "Snake",
          bestKey: "snake-best",
          help: "Use arrow keys or WASD to play."
        },
        catcher: {
          title: "Apple Catcher",
          bestKey: "catcher-best",
          help: "Use Left/Right or A/D to catch apples."
        },
        "online-snake": {
          title: "Online Snake",
          bestKey: "online-snake-best",
          help: "Player 1 is teal. Player 2 is orange."
        },
        "online-catcher": {
          title: "Online Apple Catcher",
          bestKey: "online-catcher-best",
          help: "Catch apples with your friend."
        },
        "online-tanks": {
          title: "Online Tanks",
          bestKey: "online-tanks-best",
          help: "Move with WASD/arrows. Shoot with Space."
        }
      };
      const onlineGameNames = {
        "online-snake": "Online Snake",
        "online-catcher": "Online Apple Catcher",
        "online-tanks": "Online Tanks"
      };

      let currentGame = "snake";
      let selectedOnlineGame = "online-snake";
      let snake;
      let food;
      let direction;
      let nextDirection;
      let catcher;
      let apple;
      let catcherMove = 0;
      let tankMove = 0;
      let lastTankShot = 0;
      let score;
      let best;
      let gameOver;
      let paused;
      let waitingToPlay = false;
      let timer;
      let waitingTimer;
      let pauseMenuLevel = "main";
      let onlineRoomCode = "";
      let onlinePlayerSlot = "";
      let onlineDirection = { x: 1, y: 0 };
      let onlineState = null;
      let onlineSyncBusy = false;
      let onlinePushBusy = false;
      let lastOnlineFetch = 0;
      let lastOnlinePush = 0;
      let lastOnlineSnakeMove = 0;
      let onlineFoodsDirty = false;
      let onlineApplesDirty = false;
      const firebaseDatabaseUrl = "https://fir-a3f0a-default-rtdb.firebaseio.com";
      const playerStorageKey = "snake-online-player-id";
      const ownedRoomsStorageKey = "snake-owned-room-codes";
      const accountStorageKey = "snake-account";
      const playerId = getPlayerId();
      let currentAccount = getStoredAccount();
      let createdRoomCode = "";

      function startGame(gameName) {
        if (gameName === "snake" || gameName === "catcher") {
          clearInterval(waitingTimer);
          onlineRoomCode = "";
          onlinePlayerSlot = "";
          onlineState = null;
          onlineSyncBusy = false;
          tankMove = 0;
          showLocalScoreboard();
        }

        currentGame = gameName;
        updateShootButton();
        gameTitle.textContent = games[currentGame].title;
        best = getLocalBestScore(currentGame);
        bestEl.textContent = best;
        syncCurrentBestScore();
        resetGame();
      }

      function isSinglePlayerGame(gameName) {
        return gameName === "snake" || gameName === "catcher";
      }

      function getLocalBestScore(gameName) {
        return Number(localStorage.getItem(games[gameName].bestKey) || 0);
      }

      function setLocalBestScore(gameName, value) {
        localStorage.setItem(games[gameName].bestKey, String(value));
      }

      function resetGame() {
        if (currentGame === "online-snake" || currentGame === "online-catcher" || currentGame === "online-tanks") {
          if (waitingToPlay) {
            leaveOnlineRoom();
            return;
          }
          restartOnlineGame();
          return;
        }

        score = 0;
        gameOver = false;
        waitingToPlay = true;
        paused = false;
        updateShootButton();
        updatePauseButton();
        scoreEl.textContent = score;
        pauseButton.textContent = "Pause";
        pauseMenu.classList.remove("open");
        pauseMenu.setAttribute("aria-hidden", "true");
        resetPauseMenu();
        showPlayOverlay();
        statusEl.textContent = "Press Play to start.";
        clearInterval(timer);

        if (currentGame === "snake") {
          resetSnake();
          timer = setInterval(tickSnake, 220);
        } else {
          resetCatcher();
          timer = setInterval(tickCatcher, 28);
        }

        draw();
      }

      function resetSnake() {
        snake = startSnake.map((part) => ({ ...part }));
        direction = { x: 1, y: 0 };
        nextDirection = { x: 1, y: 0 };
        placeFood();
      }

      function resetCatcher() {
        catcherMove = 0;
        catcher = {
          x: canvas.width / 2 - 48,
          y: canvas.height - 44,
          width: 96,
          height: 18
        };
        resetApple();
      }

      function resetApple() {
        apple = {
          x: 20 + Math.random() * (canvas.width - 40),
          y: -24,
          size: 18,
          speed: 3.7 + Math.min(score * 0.16, 5)
        };
      }

      function placeFood() {
        do {
          food = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)
          };
        } while (snake.some((part) => part.x === food.x && part.y === food.y));
      }

      function changeDirection(newDirection) {
        if (currentGame === "online-tanks") {
          const player = onlineState?.playersState?.[onlinePlayerSlot];

          if (player) {
            player.dir = newDirection;
            tankMove = 1;
            moveOnlineTank(player, 10);
          }

          return;
        }

        if (currentGame === "online-snake") {
          const player = onlineState?.playersState?.[onlinePlayerSlot];
          const currentDirection = player?.dir || onlineDirection;
          const reversing =
            newDirection.x + currentDirection.x === 0 &&
            newDirection.y + currentDirection.y === 0;

          if (!reversing) {
            onlineDirection = newDirection;
          }
          return;
        }

        if (currentGame === "online-catcher") {
          if (newDirection.x !== 0) {
            catcherMove = newDirection.x;
          }
          return;
        }

        if (currentGame === "catcher") {
          if (newDirection.x !== 0) {
            catcherMove = newDirection.x;
            moveCatcher(catcherMove);
          }
          return;
        }

        const reversing =
          newDirection.x + direction.x === 0 &&
          newDirection.y + direction.y === 0;

        if (!reversing) {
          nextDirection = newDirection;
        }
      }

      function moveCatcher(amount) {
        if (waitingToPlay || paused || gameOver) {
          return;
        }
        catcher.x = Math.max(0, Math.min(canvas.width - catcher.width, catcher.x + amount * 9));
        draw();
      }

      function tickSnake() {
        if (waitingToPlay || paused || gameOver) {
          return;
        }

        direction = nextDirection;
        const head = {
          x: snake[0].x + direction.x,
          y: snake[0].y + direction.y
        };

        const hitWall =
          head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount;
        const hitSelf = snake.some((part) => part.x === head.x && part.y === head.y);

        if (hitWall || hitSelf) {
          endGame();
          return;
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
          addPoint();
          placeFood();
        } else {
          snake.pop();
        }

        draw();
      }

      function tickCatcher() {
        if (waitingToPlay || paused || gameOver) {
          return;
        }

        if (catcherMove !== 0) {
          moveCatcher(catcherMove);
        }

        apple.y += apple.speed;
        const caught =
          apple.y + apple.size >= catcher.y &&
          apple.y <= catcher.y + catcher.height &&
          apple.x + apple.size >= catcher.x &&
          apple.x <= catcher.x + catcher.width;

        if (caught) {
          addPoint();
          resetApple();
        } else if (apple.y > canvas.height) {
          endGame();
          return;
        }

        draw();
      }

      function addPoint() {
        score += 1;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          saveBestScore(currentGame, best);
        }
      }

      function endGame() {
        gameOver = true;
        waitingToPlay = false;
        hidePlayOverlay();
        pauseMenu.classList.remove("open");
        pauseMenu.setAttribute("aria-hidden", "true");

      function draw() {
        drawBoard();

      function drawBoard() {
        ctx.fillStyle = "#020617";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = "rgba(148, 163, 184, 0.12)";
        ctx.lineWidth = 1;
        for (let line = 0; line <= tileCount; line += 1) {
          const position = line * gridSize;
          ctx.beginPath();
          ctx.moveTo(position, 0);
          ctx.lineTo(position, canvas.height);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, position);
          ctx.lineTo(canvas.width, position);
          ctx.stroke();
        }
      }

      function drawSnake() {
        ctx.fillStyle = "#f97316";
        roundTile(food.x, food.y, 7);

        snake.forEach((part, index) => {
          ctx.fillStyle = index === 0 ? "#5eead4" : "#14b8a6";
          roundTile(part.x, part.y, 5);
        });
      }

      function drawCatcher() {
        ctx.fillStyle = "#f97316";
        ctx.beginPath();
        ctx.arc(apple.x, apple.y, apple.size, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#14b8a6";
        ctx.beginPath();
        ctx.roundRect(catcher.x, catcher.y, catcher.width, catcher.height, 8);
        ctx.fill();

        ctx.fillStyle = "#5eead4";
        ctx.beginPath();
        ctx.roundRect(catcher.x + 14, catcher.y - 12, catcher.width - 28, 14, 7);
        ctx.fill();
      }

      function roundTile(x, y, radius) {
        const inset = 2;
        const left = x * gridSize + inset;
        const top = y * gridSize + inset;
        const size = gridSize - inset * 2;

        ctx.beginPath();
        ctx.roundRect(left, top, size, size, radius);
        ctx.fill();
      }

      document.addEventListener("keydown", (event) => {
        if (isTypingField(event.target)) {
          return;
        }

        const keys = {
          ArrowUp: { x: 0, y: -1 },
          w: { x: 0, y: -1 },
          W: { x: 0, y: -1 },
          ArrowDown: { x: 0, y: 1 },
          s: { x: 0, y: 1 },
          S: { x: 0, y: 1 },
          ArrowLeft: { x: -1, y: 0 },
          a: { x: -1, y: 0 },
          A: { x: -1, y: 0 },
          ArrowRight: { x: 1, y: 0 },
          d: { x: 1, y: 0 },
          D: { x: 1, y: 0 }
        };

        if (keys[event.key]) {
          event.preventDefault();
          changeDirection(keys[event.key]);
        }

        if (event.key === " ") {
          event.preventDefault();
          if (currentGame === "online-tanks") {
            shootOnlineTank();
          } else {
            togglePause();
          }
        }
      });

      document.addEventListener("keyup", (event) => {
        if (isTypingField(event.target)) {
          return;
        }

        if (currentGame === "online-tanks") {
          const movementKey = ["ArrowUp", "w", "W", "ArrowDown", "s", "S", "ArrowLeft", "a", "A", "ArrowRight", "d", "D"].includes(event.key);

          if (movementKey) {
            tankMove = 0;
          }

          return;
        }

        if (currentGame !== "catcher" && currentGame !== "online-catcher") {
          return;
        }

        const leftReleased = ["ArrowLeft", "a", "A"].includes(event.key) && catcherMove < 0;
        const rightReleased = ["ArrowRight", "d", "D"].includes(event.key) && catcherMove > 0;

        if (leftReleased || rightReleased) {
          catcherMove = 0;
        }
      });

      function isTypingField(element) {
        return element instanceof HTMLInputElement || element instanceof HTMLTextAreaElement;
      }

      document.querySelectorAll("[data-direction]").forEach((button) => {
        const directions = {
          up: { x: 0, y: -1 },
          down: { x: 0, y: 1 },
          left: { x: -1, y: 0 },
          right: { x: 1, y: 0 }
        };

        button.addEventListener("click", () => {
          if (currentGame === "catcher" || currentGame === "online-catcher") {
            return;
          }
          changeDirection(directions[button.dataset.direction]);
          if (currentGame === "online-tanks") {
            tankMove = 0;
          }
        });

        button.addEventListener("pointerdown", (event) => {
          if (currentGame === "online-tanks") {
            event.preventDefault();
            const direction = directions[button.dataset.direction];
            const player = onlineState?.playersState?.[onlinePlayerSlot];

            if (player) {
              player.dir = direction;
              tankMove = 1;
              button.setPointerCapture(event.pointerId);
            }

            return;
          }

          if (currentGame !== "catcher" && currentGame !== "online-catcher") {
            return;
          }

          const direction = directions[button.dataset.direction];
          if (direction.x !== 0) {
            event.preventDefault();
            catcherMove = direction.x;
            button.setPointerCapture(event.pointerId);
          }
        });

        button.addEventListener("pointerup", () => {
          if (currentGame === "online-tanks") {
            tankMove = 0;
          }

          if (currentGame === "catcher" || currentGame === "online-catcher") {
            catcherMove = 0;
          }
        });

        button.addEventListener("pointercancel", () => {

      async function hashPassword(password) {
        const data = new TextEncoder().encode(password);
        const hashBuffer = await crypto.subtle.digest("SHA-256", data);
        return Array.from(new Uint8Array(hashBuffer))
          .map((byte) => byte.toString(16).padStart(2, "0"))
          .join("");
      }

      async function syncBestScoresFromAccount() {
        if (!currentAccount?.username) {
          return;
        }

        try {
          const user = await getUser(usernameKey(currentAccount.username));
          const remoteScores = user?.bestScores || {};
          const localScores = getLocalBestScores();
          const mergedScores = {
            snake: Math.max(Number(remoteScores.snake || 0), localScores.snake),
            catcher: Math.max(Number(remoteScores.catcher || 0), localScores.catcher)
          };

          setLocalBestScore("snake", mergedScores.snake);
          setLocalBestScore("catcher", mergedScores.catcher);

          await patchUser(usernameKey(currentAccount.username), {
            bestScores: mergedScores
          });

          if (isSinglePlayerGame(currentGame)) {
            best = mergedScores[currentGame] || 0;
            bestEl.textContent = best;
          }
        } catch {
          statusEl.textContent = "Could not load cloud records.";
        }
      }

      function syncCurrentBestScore() {

      async function createUserIfAvailable(username, user) {
        const checkResponse = await fetch(`${firebaseDatabaseUrl}/users/${username}.json`, {
          headers: {
            "X-Firebase-ETag": "true"
          }
        });

        if (!checkResponse.ok) {
          throw new Error("Could not check username.");
        }

        const existingUser = await checkResponse.json();

        if (existingUser) {
          return false;
        }

        const etag = checkResponse.headers.get("ETag");
        const createResponse = await fetch(`${firebaseDatabaseUrl}/users/${username}.json`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "If-Match": etag
          },
          body: JSON.stringify(user)
        });

        if (createResponse.status === 412) {
          return false;
        }

        if (!createResponse.ok) {
          throw new Error("Could not save account.");
        }

        return true;
      }

      async function addAdminPoint() {
        if (!currentAccount?.isAdmin) {
          return;
        }

        const points = Math.max(1, Math.floor(Number(pointsInput.value) || 1));
        pointsInput.value = points;

        if (currentGame.startsWith("online-")) {
          const targetSlot = pointsTargetSelect.value || onlinePlayerSlot;

          if (!onlineRoomCode || !targetSlot || !onlineState?.playersState?.[targetSlot]) {
            adminMessage.textContent = "No online player to add points to.";
            return;
          }

          const player = onlineState.playersState[targetSlot];
          player.adminPoints = (player.adminPoints || 0) + points;

          if (targetSlot === onlinePlayerSlot) {
            score = getPlayerTotalScore(player);
            scoreEl.textContent = score;
          }

          updateOnlineScoreboard();
          adminMessage.textContent = `Added ${points} points to ${player.username || targetSlot.toUpperCase()}.`;

          try {
            await patchRoom(onlineRoomCode, {
              [`playersState/${targetSlot}/adminPoints`]: player.adminPoints,
              updatedAt: Date.now()
            });
          } catch {
            adminMessage.textContent = "Point added locally, but Firebase sync failed.";
          }

          return;
        }

        score += points;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          saveBestScore(currentGame, best);
        }
        adminMessage.textContent = `Added ${points} points.`;
      }

      async function registerAccount() {
        const username = sanitizeUsername(usernameInput.value);
        const userKey = usernameKey(username);
        const password = passwordInput.value;

        if (username.length < 3 || password.length < 4) {
          authMessage.textContent = "Use 3+ username letters and 4+ password letters.";
          return;
        }

        loginButton.disabled = true;
        registerButton.disabled = true;
        authMessage.textContent = "Creating account...";

        try {
          const passwordHash = await hashPassword(password);
          const created = await createUserIfAvailable(userKey, {
            username,
            passwordHash,
            bestScores: getLocalBestScores(),
            createdAt: Date.now()
          });

          if (!created) {
            authMessage.textContent = "Username already exists.";
            return;
          }

          passwordInput.value = "";
          authMessage.textContent = "";
          setStoredAccount({ username, isAdmin: false });
          syncBestScoresFromAccount();
        } catch {
          authMessage.textContent = "Could not register. Check Firebase rules.";
        } finally {
          loginButton.disabled = false;
          registerButton.disabled = false;
        }
      }

      async function loginAccount() {
        const username = sanitizeUsername(usernameInput.value);
        const userKey = usernameKey(username);
        const password = passwordInput.value;

        if (!username || !password) {
          authMessage.textContent = "Enter username and password.";
          return;
        }

        loginButton.disabled = true;
        registerButton.disabled = true;
        authMessage.textContent = "Logging in...";

        try {
          const user = await getUser(userKey);
          const passwordHash = await hashPassword(password);

          if (!user || user.passwordHash !== passwordHash) {
            authMessage.textContent = "Wrong username or password.";
            return;
          }

          passwordInput.value = "";
          authMessage.textContent = "";
          setStoredAccount({
            username: user.username || username,
            isAdmin: Boolean(user.isAdmin)
          });
          syncBestScoresFromAccount();
        } catch {
          authMessage.textContent = "Could not log in. Check Firebase rules.";
        } finally {
          loginButton.disabled = false;
          registerButton.disabled = false;
        }

      function makeOnlineFood(blockedCells = []) {
        let foodItem;
        let attempts = 0;

        do {
          foodItem = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)
          };
          attempts += 1;
        } while (
          attempts < 200 &&
          blockedCells.some((cell) => cell.x === foodItem.x && cell.y === foodItem.y)
        );

        return foodItem;
      }

      function makeOnlineFoods(state = null) {
        const foods = [];

        while (foods.length < 4) {
          foods.push(makeOnlineFood([...getOnlineSnakeBlockedCells(state), ...foods]));
        }

        return foods;
      }

      async function beginOnlineRoom(code, gameName, slot, room) {
        clearInterval(timer);

        onlineRoomCode = code;
        onlinePlayerSlot = slot;
        currentGame = gameName;
        updateShootButton();
        gameTitle.textContent = onlineGameNames[gameName] || games[gameName].title;

        hidePlayOverlay();
        pauseButton.textContent = "Pause";
        pauseMenu.classList.remove("open");
        pauseMenu.setAttribute("aria-hidden", "true");
        resetPauseMenu();

        onlineState = prepareOnlineState(room, gameName, slot);
        updateOnlineScoreboard();
        onlineDirection = onlineState.playersState[slot]?.dir || { x: 1, y: 0 };
        onlineSyncBusy = false;
        onlinePushBusy = false;
        lastOnlineFetch = 0;
        lastOnlinePush = 0;
        lastOnlineSnakeMove = 0;
        onlineFoodsDirty = false;
        onlineApplesDirty = false;
        tankMove = 0;
        lastTankShot = 0;
        statusEl.textContent =
          `${slot === "p1" ? "Player 1" : "Player 2"} in ${gameTitle.textContent}. Room ${code}.`;
        await saveRoom(code, onlineState);
        drawOnlineGame();
        timer = setInterval(tickOnlineGame, gameName === "online-snake" ? 240 : 35);
      }

      function prepareOnlineState(room, gameName, slot) {
        const state = {
          ...room,
          game: gameName,
          gameName: onlineGameNames[gameName],
          playersState: {
            ...(room.playersState || {})
          }
        };

        if (!state.playersState.p1) {
          state.playersState.p1 = makeOnlinePlayer("p1", gameName);
        }

        if (slot === "p2" && !state.playersState.p2) {
          state.playersState.p2 = makeOnlinePlayer("p2", gameName);
        }

        if (state.playersState.p1) {
          state.playersState.p1.username = state.playersState.p1.username || "P1";
        }

        if (state.playersState.p2) {
          state.playersState.p2.username = state.playersState.p2.username || "P2";
        }

        if (state.playersState[slot] && currentAccount?.username) {
          state.playersState[slot].username = currentAccount.username;
        }

        if (gameName === "online-snake") {
          state.foods = Array.isArray(state.foods)
            ? state.foods.slice(0, 4)
            : state.food
              ? [state.food]
              : [];

          while (state.foods.length < 4) {
            state.foods.push(makeOnlineFood([...getOnlineSnakeBlockedCells(state), ...state.foods]));
          }

          state.foods = state.foods.map((foodItem, index) => {
            const blockedCells = [
              ...getOnlineSnakeBlockedCells(state),
              ...state.foods.filter((_, foodIndex) => foodIndex !== index)
            ];
            const blocked = blockedCells.some((cell) => cell.x === foodItem.x && cell.y === foodItem.y);

            return blocked ? makeOnlineFood(blockedCells) : foodItem;
          });

          delete state.food;
        }

        if (gameName === "online-catcher") {
          state.apples = Array.isArray(state.apples)
            ? state.apples.slice(0, 4)
            : state.apple
              ? [state.apple]
              : [];

          while (state.apples.length < 4) {
            state.apples.push(makeOnlineApple());
          }

          delete state.apple;
        }

        return state;
      }

      function getOnlineSnakeBlockedCells(state = onlineState) {
        const playersState = state?.playersState || {};
        const p1Snake = playersState.p1?.snake || [];
        const p2Snake = playersState.p2?.snake || [];
        return [...p1Snake, ...p2Snake];
      }

      function ensureOnlineSnakeFoods() {
        if (!onlineState) {
          return;
        }

        onlineState.foods = Array.isArray(onlineState.foods) ? onlineState.foods.slice(0, 4) : [];

        while (onlineState.foods.length < 4) {
          onlineState.foods.push(makeOnlineFood([...getOnlineSnakeBlockedCells(), ...onlineState.foods]));
          onlineFoodsDirty = true;
        }

        onlineState.foods = onlineState.foods.map((foodItem, index) => {
          const blockedCells = [
            ...getOnlineSnakeBlockedCells(),
            ...onlineState.foods.filter((_, foodIndex) => foodIndex !== index)
          ];
          const blocked = blockedCells.some((cell) => cell.x === foodItem.x && cell.y === foodItem.y);

          if (blocked) {
            onlineFoodsDirty = true;
            return makeOnlineFood(blockedCells);
          }

          return foodItem;
        });
      }

      async function restartOnlineGame() {
        if (!onlineRoomCode || !onlinePlayerSlot) {
          startGame("snake");
          return;
        }

        try {
          const room = await getRoom(onlineRoomCode);

          if (!room) {
            startGame("snake");
            return;
          }

          onlineState = prepareOnlineState(room, currentGame, onlinePlayerSlot);
          const resetPlayer = makeOnlinePlayer(onlinePlayerSlot, currentGame);
          onlineState.playersState[onlinePlayerSlot] = resetPlayer;
          onlineDirection = resetPlayer.dir || { x: 1, y: 0 };
          score = 0;
          scoreEl.textContent = "0";
          gameOver = false;
          paused = false;
          waitingToPlay = false;
          lastOnlineSnakeMove = 0;
          tankMove = 0;
          lastTankShot = 0;
          hidePlayOverlay();
          pauseButton.textContent = "Pause";
          statusEl.textContent = `Restarted in room ${onlineRoomCode}.`;
          await patchRoom(onlineRoomCode, {
            [`playersState/${onlinePlayerSlot}`]: resetPlayer,
            updatedAt: Date.now()
          });
          updateOnlineScoreboard();
          drawOnlineGame();

          clearInterval(timer);
          timer = setInterval(tickOnlineGame, currentGame === "online-snake" ? 240 : 35);
        } catch {
          statusEl.textContent = "Could not restart online game.";
        }
      }

      function waitForSecondPlayer(code, gameName, room) {
        clearInterval(timer);
        clearInterval(waitingTimer);
        onlineRoomCode = code;
        onlinePlayerSlot = "p1";
        currentGame = gameName;
        updateShootButton();
        gameTitle.textContent = onlineGameNames[gameName];
        showOnlineScoreboard();
        scoreEl.textContent = "0";
        bestEl.textContent = "0";
        gameOver = false;
        paused = false;
        waitingToPlay = true;
        updateShootButton();
        updatePauseButton();
        resetPauseMenu();
        pauseMenu.classList.remove("open");
        pauseMenu.setAttribute("aria-hidden", "true");
        showWaitingOverlay(code, gameName);
        statusEl.textContent = `Room ${code}. Waiting for player 2.`;
        drawBoard();
        onlineState = prepareOnlineState(room, gameName, "p1");
        updateOnlineScoreboard();

        waitingTimer = setInterval(async () => {
          try {
            const latestRoom = await getRoom(code);

            if (!latestRoom) {
              clearInterval(waitingTimer);
              statusEl.textContent = "Room closed.";
              startGame("snake");
              return;
            }

            if (latestRoom.players >= 2 && latestRoom.playersState?.p2) {
              clearInterval(waitingTimer);
              waitingToPlay = false;
              updateShootButton();
              updatePauseButton();
              await beginOnlineRoom(code, gameName, "p1", latestRoom);
            }
          } catch {
            statusEl.textContent = "Waiting sync failed. Check Firebase rules or connection.";
          }
        }, 900);
      }

      async function leaveOnlineRoom() {
        if (!onlineRoomCode) {
          startGame("snake");
          return;
        }

        const roomToLeave = onlineRoomCode;
        const slotToLeave = onlinePlayerSlot;
        const wasCreator = slotToLeave === "p1";

        clearInterval(timer);
        clearInterval(waitingTimer);
        leaveRoomButton.disabled = true;
        statusEl.textContent = "Leaving room...";

        try {
          if (wasCreator) {
            await deleteRoom(roomToLeave);
          } else {
            await patchRoom(roomToLeave, {
              players: 1,
              joinedBy: null,
              joinedAt: null,
              "playersState/p2": null,
              updatedAt: Date.now()
            });
          }
        } catch {
          statusEl.textContent = "Left locally. Could not update room server.";
        } finally {
          onlineRoomCode = "";
          onlinePlayerSlot = "";
          onlineState = null;
          onlineSyncBusy = false;
          catcherMove = 0;
          tankMove = 0;
          leaveRoomButton.disabled = false;
          startGame("snake");
        }
      }

      function tickOnlineGame() {
        if (paused || gameOver || !onlineRoomCode) {
          return;
        }

        if (currentGame === "online-snake") {
          ensureOnlineSnakeFoods();
          updateOnlineSnake();
        } else if (currentGame === "online-tanks") {
          updateOnlineTanks();
        } else {
          updateOnlineCatcher();
        }

        updateOnlineScoreboard();
        drawOnlineGame();
        syncOnlineState();
      }

      function syncOnlineState() {
        const now = Date.now();
        const fetchDelay = currentGame === "online-snake" ? 260 : 180;
        const pushDelay = currentGame === "online-snake" ? 120 : 80;

        if (!onlinePushBusy && now - lastOnlinePush > pushDelay) {
          lastOnlinePush = now;
          onlinePushBusy = true;
          const patch = buildOnlinePatch();
          const pushedFoods = Object.prototype.hasOwnProperty.call(patch, "foods");
          const pushedApples = Object.prototype.hasOwnProperty.call(patch, "apples");

          patchRoom(onlineRoomCode, patch)
            .then(() => {
              if (pushedFoods) {
                onlineFoodsDirty = false;
              }
              if (pushedApples) {
                onlineApplesDirty = false;
              }
            })
            .catch(() => {
              statusEl.textContent = "Online sync failed. Check Firebase rules or connection.";
            })
            .finally(() => {
              onlinePushBusy = false;
            });
        }

        if (onlineSyncBusy || now - lastOnlineFetch < fetchDelay) {
          return;
        }

        onlineSyncBusy = true;
        lastOnlineFetch = now;

        getRoom(onlineRoomCode)
          .then((room) => {
            if (!room) {
              endGame();
              statusEl.textContent = "Online room closed.";
              return;
            }

            mergeOnlineState(room);
          })
          .catch(() => {
            statusEl.textContent = "Online sync failed. Check Firebase rules or connection.";
          })
          .finally(() => {
            onlineSyncBusy = false;
          });
      }

      function buildOnlinePatch() {
        const patch = {
          updatedAt: Date.now()
        };

        const player = onlineState.playersState[onlinePlayerSlot];

        if (player) {
          Object.entries(player).forEach(([key, value]) => {
            if (key === "adminPoints") {
              return;
            }

            patch[`playersState/${onlinePlayerSlot}/${key}`] = value;
          });
        }

        if (currentGame === "online-snake") {
          ensureOnlineSnakeFoods();
          if (onlineFoodsDirty) {
            patch.foods = onlineState.foods || null;
            patch.food = null;
          }
        }

        if (currentGame === "online-catcher") {
          if (onlineApplesDirty) {
            patch.apples = onlineState.apples || null;
            patch.apple = null;
          }
        }

        return patch;
      }

      function mergeOnlineState(room) {
        const remoteState = prepareOnlineState(room, currentGame, onlinePlayerSlot);
        const otherSlot = onlinePlayerSlot === "p1" ? "p2" : "p1";
        const localPlayer = onlineState.playersState[onlinePlayerSlot];
        const remotePlayer = remoteState.playersState[onlinePlayerSlot];

        if (localPlayer && remotePlayer) {
          localPlayer.adminPoints = remotePlayer.adminPoints || 0;
          localPlayer.username = remotePlayer.username || localPlayer.username;
          score = getPlayerTotalScore(localPlayer);
          scoreEl.textContent = score;
        }

        if (remoteState.playersState[otherSlot]) {
          onlineState.playersState[otherSlot] = remoteState.playersState[otherSlot];
        }

        if (currentGame === "online-snake" && remoteState.foods && !onlineFoodsDirty) {
          if (!Array.isArray(room.foods) || room.foods.length < 4) {
            onlineFoodsDirty = true;
          }
          onlineState.foods = remoteState.foods;
          ensureOnlineSnakeFoods();
        }

        if (currentGame === "online-catcher" && remoteState.apples && !onlineApplesDirty) {
          if (!Array.isArray(room.apples) || room.apples.length < 4) {
            onlineApplesDirty = true;
          }
          onlineState.apples = remoteState.apples;
        }
      }

      function updateOnlineSnake() {
        ensureOnlineSnakeFoods();
        const player = onlineState.playersState[onlinePlayerSlot];

        if (!player?.alive) {
          return;
        }

        const now = Date.now();
        if (now - lastOnlineSnakeMove < 225) {
          return;
        }
        lastOnlineSnakeMove = now;

        player.dir = onlineDirection;
        const head = player.snake[0];
        const rawHead = {
          x: head.x + player.dir.x,
          y: head.y + player.dir.y
        };
        const nextHead = {
          x: (rawHead.x + tileCount) % tileCount,
          y: (rawHead.y + tileCount) % tileCount
        };
        const hitSelf = player.snake.some((part) => part.x === nextHead.x && part.y === nextHead.y);

        if (hitSelf) {
          player.alive = false;
          statusEl.textContent = "You crashed. Press Restart to rejoin.";
          return;
        }

        player.snake.unshift(nextHead);

        const eatenFoodIndex = onlineState.foods.findIndex(
          (foodItem) => nextHead.x === foodItem.x && nextHead.y === foodItem.y
        );

        if (eatenFoodIndex >= 0) {
          player.score += 1;
          onlineState.foods[eatenFoodIndex] = makeOnlineFood([
            ...getOnlineSnakeBlockedCells(),
            ...onlineState.foods.filter((_, index) => index !== eatenFoodIndex)
          ]);
          onlineFoodsDirty = true;
        } else {
          player.snake.pop();
        }

        score = getPlayerTotalScore(player);
        scoreEl.textContent = score;
        updateOnlineScoreboard();
      }

      function updateOnlineCatcher() {
        const player = onlineState.playersState[onlinePlayerSlot];

        if (!player?.alive) {
          return;
        }

        if (catcherMove !== 0) {
          player.x = Math.max(0, Math.min(canvas.width - 96, player.x + catcherMove * 9));
        }

        if (onlinePlayerSlot === "p1") {
          onlineState.apples = onlineState.apples.map((appleItem) => {
            const nextApple = {
              ...appleItem,
              y: appleItem.y + appleItem.speed
            };

            return nextApple.y > canvas.height ? makeOnlineApple() : nextApple;
          });
          onlineApplesDirty = true;
        }

        const caughtAppleIndex = onlineState.apples.findIndex(
          (appleItem) =>
            appleItem.y + appleItem.size >= player.y &&
            appleItem.y <= player.y + 18 &&
            appleItem.x + appleItem.size >= player.x &&
            appleItem.x <= player.x + 96
        );

        if (caughtAppleIndex >= 0) {
          player.score += 1;
          onlineState.apples[caughtAppleIndex] = makeOnlineApple();
          onlineApplesDirty = true;
        }

        score = getPlayerTotalScore(player);
        scoreEl.textContent = score;
        updateOnlineScoreboard();
      }

      function moveOnlineTank(player, speed) {
        player.x = Math.max(18, Math.min(canvas.width - 18, player.x + player.dir.x * speed));
        player.y = Math.max(18, Math.min(canvas.height - 18, player.y + player.dir.y * speed));
      }

      function shootOnlineTank() {
        if (currentGame !== "online-tanks" || paused || gameOver || !onlineState) {
          return;
        }

        const now = Date.now();
        if (now - lastTankShot < 380) {
          return;
        }

        const player = onlineState.playersState[onlinePlayerSlot];
        if (!player) {
          return;
        }

        lastTankShot = now;
        player.bullets = Array.isArray(player.bullets) ? player.bullets : [];
        player.bullets.push({
          x: player.x + player.dir.x * 22,
          y: player.y + player.dir.y * 22,
          dx: player.dir.x,
          dy: player.dir.y
        });
      }

      function updateOnlineTanks() {
        const player = onlineState.playersState[onlinePlayerSlot];
        const opponentSlot = onlinePlayerSlot === "p1" ? "p2" : "p1";
        const opponent = onlineState.playersState[opponentSlot];

        if (!player) {
          return;
        }

        if (tankMove !== 0) {
          moveOnlineTank(player, 4.2);
        }

        player.bullets = (player.bullets || [])
          .map((bullet) => ({
            ...bullet,
            x: bullet.x + bullet.dx * 10,
            y: bullet.y + bullet.dy * 10
          }))
          .filter((bullet) => bullet.x > 0 && bullet.x < canvas.width && bullet.y > 0 && bullet.y < canvas.height);

        if (opponent) {
          player.bullets = player.bullets.filter((bullet) => {
            const hit = Math.abs(bullet.x - opponent.x) < 22 && Math.abs(bullet.y - opponent.y) < 22;

            if (hit) {
              player.score = (player.score || 0) + 1;
            }

            return !hit;
          });
        }

        score = getPlayerTotalScore(player);
        scoreEl.textContent = score;
        updateOnlineScoreboard();
      }

      function showLocalScoreboard() {
        localScoreboard.hidden = false;
        onlineScoreboard.hidden = true;
        updatePointsTargetOptions();
      }

      function showOnlineScoreboard() {
        localScoreboard.hidden = true;
        onlineScoreboard.hidden = false;
        updateOnlineScoreboard();
      }

      function updateOnlineScoreboard() {
        const playerOne = onlineState?.playersState?.p1;
        const playerTwo = onlineState?.playersState?.p2;

        playerOneNameEl.textContent = playerOne?.username || "P1";
        playerTwoNameEl.textContent = playerTwo?.username || "P2";
        playerOneScoreEl.textContent = getPlayerTotalScore(playerOne);
        playerTwoScoreEl.textContent = getPlayerTotalScore(playerTwo);
        updatePointsTargetOptions();
      }

      function getPlayerTotalScore(player) {
        return (player?.score || 0) + (player?.adminPoints || 0);
      }

      function updatePointsTargetOptions() {
        if (!pointsTargetSelect) {
          return;
        }

        const previousValue = pointsTargetSelect.value;
        pointsTargetSelect.innerHTML = "";

        if (onlineState?.playersState && currentGame.startsWith("online-")) {
          ["p1", "p2"].forEach((slot) => {
            const player = onlineState.playersState[slot];

            if (!player) {
              return;
            }

            const option = document.createElement("option");
            option.value = slot;
            option.textContent = player.username || slot.toUpperCase();
            pointsTargetSelect.appendChild(option);
          });
        }

        if (!pointsTargetSelect.options.length) {
          const option = document.createElement("option");
          option.value = "local";
          option.textContent = "Current game";
          pointsTargetSelect.appendChild(option);
        }

        const values = Array.from(pointsTargetSelect.options).map((option) => option.value);

        if (values.includes(previousValue)) {
          pointsTargetSelect.value = previousValue;
        } else if (values.includes(onlinePlayerSlot)) {
          pointsTargetSelect.value = onlinePlayerSlot;
        }
      }

      function drawOnlineGame() {
        drawBoard();

        if (!onlineState) {
          return;
        }

        if (currentGame === "online-snake") {
          drawOnlineSnake();
        } else if (currentGame === "online-tanks") {
          drawOnlineTanks();
        } else {
          drawOnlineCatcher();
        }
      }

      function drawOnlineSnake() {
        ensureOnlineSnakeFoods();
        if (onlineState.foods) {
          ctx.fillStyle = "#f97316";
          onlineState.foods.forEach((foodItem) => {
            roundTile(foodItem.x, foodItem.y, 7);
          });
        }

        drawOnlineSnakePlayer(onlineState.playersState.p1, "#5eead4", "#14b8a6");
        drawOnlineSnakePlayer(onlineState.playersState.p2, "#fdba74", "#f97316");
      }

      function drawOnlineSnakePlayer(player, headColor, bodyColor) {
        if (!player?.snake) {
          return;
        }

        player.snake.forEach((part, index) => {
          ctx.fillStyle = index === 0 ? headColor : bodyColor;
          roundTile(part.x, part.y, 5);
        });
      }

      function drawOnlineCatcher() {
        if (onlineState.apples) {
          ctx.fillStyle = "#f97316";
          onlineState.apples.forEach((appleState) => {
            ctx.beginPath();
            ctx.arc(appleState.x, appleState.y, appleState.size, 0, Math.PI * 2);
            ctx.fill();
          });
        }

        drawOnlineCatcherPlayer(onlineState.playersState.p1, "#14b8a6", "#5eead4");
        drawOnlineCatcherPlayer(onlineState.playersState.p2, "#f97316", "#fdba74");
      }

      function drawOnlineCatcherPlayer(player, baseColor, topColor) {
        if (!player) {
          return;
        }

        ctx.fillStyle = baseColor;
        ctx.beginPath();
        ctx.roundRect(player.x, player.y, 96, 18, 8);
        ctx.fill();

        ctx.fillStyle = topColor;
        ctx.beginPath();
        ctx.roundRect(player.x + 14, player.y - 12, 68, 14, 7);
        ctx.fill();
      }

      function drawOnlineTanks() {
        drawTankPlayer(onlineState.playersState.p1, "#14b8a6", "#5eead4");
        drawTankPlayer(onlineState.playersState.p2, "#f97316", "#fdba74");
      }

      function drawTankPlayer(player, baseColor, turretColor) {
        if (!player) {
          return;
        }

        ctx.fillStyle = baseColor;
        ctx.beginPath();
        ctx.roundRect(player.x - 18, player.y - 18, 36, 36, 7);
        ctx.fill();

        ctx.strokeStyle = turretColor;
        ctx.lineWidth = 8;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(player.x, player.y);
        ctx.lineTo(player.x + player.dir.x * 28, player.y + player.dir.y * 28);
        ctx.stroke();

        ctx.fillStyle = turretColor;
        (player.bullets || []).forEach((bullet) => {
          ctx.beginPath();
          ctx.arc(bullet.x, bullet.y, 5, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      async function createRoom() {
        createRoomButton.disabled = true;
        joinRoomButton.disabled = true;
        roomCodeEl.textContent = "";
        roomNoteEl.textContent = `Creating ${onlineGameNames[selectedOnlineGame]} room...`;

        try {
          const code = await generateRoomCode();
          const room = {
            players: 1,
            game: selectedOnlineGame,
            gameName: onlineGameNames[selectedOnlineGame],
            createdBy: playerId,
            joinedBy: null,
            createdAt: Date.now(),
            playersState: {
              p1: makeOnlinePlayer("p1", selectedOnlineGame)
            },
            foods: null,
            apples: selectedOnlineGame === "online-catcher" ? makeOnlineApples() : null
          };

          if (selectedOnlineGame === "online-snake") {
            room.foods = makeOnlineFoods(room);
          }

          await saveRoom(code, room);
          createdRoomCode = code;
          saveOwnedRoomCode(code);
          roomCodeInput.value = code;
          roomCodeEl.textContent = `Room code: ${code}`;
          roomNoteEl.textContent = `${room.gameName} selected. Share this code with player 2.`;
          waitForSecondPlayer(code, selectedOnlineGame, room);
        } catch {
          roomCodeEl.textContent = "";
          roomNoteEl.textContent = "Could not create room. Check Firebase database rules.";
        } finally {
          createRoomButton.disabled = false;
          joinRoomButton.disabled = false;
        }
      }

      async function joinRoom() {
        const code = roomCodeInput.value.trim().toUpperCase();

        if (!code) {
          roomCodeEl.textContent = "";
          roomNoteEl.textContent = "Enter a room code first.";
          return;
        }

        if (code === createdRoomCode || getOwnedRoomCodes().includes(code)) {
          roomCodeEl.textContent = `Room code: ${code}`;
          roomNoteEl.textContent = "You created this room. A different player must join it.";
          return;
        }

        createRoomButton.disabled = true;
        joinRoomButton.disabled = true;
        roomCodeEl.textContent = "";
        roomNoteEl.textContent = "Joining room...";

        try {
          const room = await getRoom(code);

          if (!room) {
            roomCodeEl.textContent = "";
            roomNoteEl.textContent = "Room not found. Check the code from player 1.";
            return;
          }

          if (room.createdBy === playerId) {
            roomCodeEl.textContent = `Room code: ${code}`;
            roomNoteEl.textContent = "You created this room. A different player must join it.";
            return;
          }

          if (room.players >= 2) {
            roomCodeEl.textContent = `Room code: ${code}`;
            roomNoteEl.textContent = "This room is already full.";
            return;
          }

          const joinedRoom = {
            ...room,
            players: 2,
            playersState: {
              ...(room.playersState || {}),
              p2: makeOnlinePlayer("p2", room.game || "online-snake")
            },
            joinedBy: playerId,
            joinedAt: Date.now()
          };

          await saveRoom(code, joinedRoom);
          roomCodeEl.textContent = `Joined room: ${code}`;
          roomNoteEl.textContent = `Joined ${room.gameName || "online game"}. Online match setup is ready.`;
          await beginOnlineRoom(code, room.game || "online-snake", "p2", joinedRoom);
        } catch {
          roomCodeEl.textContent = "";
          roomNoteEl.textContent = "Could not join room. Check Firebase database rules.";
        } finally {
          createRoomButton.disabled = false;
          joinRoomButton.disabled = false;
        }
      }

      function clearRoomMessage() {
        roomCodeEl.textContent = "";
        roomNoteEl.textContent = "";
      }

      function updateOnlineGameSelection() {
        onlineGameButtons.forEach((button) => {
          button.classList.toggle("selected", button.dataset.onlineGame === selectedOnlineGame);
        });
      }

      restartButton.addEventListener("click", resetGame);
      playButton.addEventListener("click", playLocalGame);
      cancelWaitButton.addEventListener("click", leaveOnlineRoom);
      shootButton.addEventListener("click", shootOnlineTank);
      loginButton.addEventListener("click", loginAccount);
      registerButton.addEventListener("click", registerAccount);
      logoutButton.addEventListener("click", () => {
        setStoredAccount(null);
      });
      refreshAdminButton.addEventListener("click", loadAdminPanel);
      clearRoomsButton.addEventListener("click", clearAllRooms);
      addPointsButton.addEventListener("click", addAdminPoint);
      passwordInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          loginAccount();
        }
      });
      pauseButton.addEventListener("click", togglePause);
      resumeButton.addEventListener("click", togglePause);
      leaveRoomButton.addEventListener("click", leaveOnlineRoom);
      gamesButton.addEventListener("click", () => {
        showGameModeMenu();
      });
      singlePlayerButton.addEventListener("click", () => {
        showGameList("single");
      });
      onlineButton.addEventListener("click", () => {
        showGameList("online");
      });
      snakeClassicButton.addEventListener("click", () => {
        startGame("snake");
      });
      appleCatcherButton.addEventListener("click", () => {
        startGame("catcher");
      });
      onlineGameButtons.forEach((button) => {
        button.addEventListener("click", () => {
          selectedOnlineGame = button.dataset.onlineGame;
          updateOnlineGameSelection();
          clearRoomMessage();
        });
      });
      createRoomButton.addEventListener("click", createRoom);
      joinRoomButton.addEventListener("click", joinRoom);
      roomCodeInput.addEventListener("input", () => {
        roomCodeInput.value = roomCodeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
      });
      backButton.addEventListener("click", () => {
        if (pauseMenuLevel === "single" || pauseMenuLevel === "online") {
          showGameModeMenu();
        } else {
          resetPauseMenu();
        }
      });

      refreshStoredAccountRole();
      startGame("snake");
    </script>
  </body>
</html>
