<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Snake - Danya</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, Helvetica, sans-serif;
        background: #111827;
        color: #f8fafc;
        --app-width: 620px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(20, 184, 166, 0.28), transparent 32rem),
          linear-gradient(135deg, #111827 0%, #172033 55%, #0f172a 100%);
      }

      body[data-theme="midnight"] {
        background:
          radial-gradient(circle at top left, rgba(20, 184, 166, 0.28), transparent 32rem),
          linear-gradient(135deg, #111827 0%, #172033 55%, #0f172a 100%);
      }

      body[data-theme="forest"] {
        background:
          radial-gradient(circle at top left, rgba(34, 197, 94, 0.24), transparent 32rem),
          linear-gradient(135deg, #052e16 0%, #14331f 55%, #020617 100%);
      }

      body[data-theme="purple"] {
        background:
          radial-gradient(circle at top left, rgba(168, 85, 247, 0.26), transparent 32rem),
          linear-gradient(135deg, #1e1b4b 0%, #312e81 55%, #020617 100%);
      }

      main {
        width: min(92vw, var(--app-width));
        display: grid;
        gap: 1rem;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 1rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 9vw, 4.5rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .scoreboard {
        display: flex;
        gap: 0.75rem;
        font-weight: 700;
      }

      .scoreboard[hidden] {
        display: none;
      }

      .stat {
        min-width: 5rem;
        padding: 0.65rem 0.75rem;
        border: 1px solid rgba(248, 250, 252, 0.2);
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.72);
        text-align: center;
      }

      .stat span {
        display: block;
        margin-top: 0.15rem;
        color: #5eead4;
        font-size: 1.35rem;
      }

      .game {
        position: relative;
        display: grid;
        gap: 0.9rem;
      }

      .play-overlay {
        position: absolute;
        inset: 0 0 auto;
        aspect-ratio: 1;
        display: none;
        place-items: center;
        padding: 1rem;
        border-radius: 8px;
        background: rgba(2, 6, 23, 0.64);
      }

      .play-overlay.open {
        display: grid;
      }

      .play-panel {
        width: min(74vw, 260px);
        display: grid;
        gap: 0.75rem;
        text-align: center;
      }

      .play-panel h2 {
        margin: 0;
        font-size: 1.75rem;
      }

      .play-panel p {
        margin: 0;
        color: #cbd5e1;
        font-weight: 800;
      }

      canvas {
        width: 100%;
        aspect-ratio: 1;
        display: block;
        border: 2px solid rgba(248, 250, 252, 0.22);
        border-radius: 8px;
        background: #020617;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
      }

      .controls {
        display: flex;
        justify-content: space-between;
        gap: 0.75rem;
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 8px;
        padding: 0.7rem 0.95rem;
        background: #14b8a6;
        color: #042f2e;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
      }

      button:hover {
        background: #2dd4bf;
      }

      button.selected {
        outline: 3px solid #f97316;
        outline-offset: 2px;
      }

      .pad {
        width: min(72vw, 240px);
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.45rem;
      }

      .pad button {
        aspect-ratio: 1.25;
        padding: 0;
        background: rgba(248, 250, 252, 0.12);
        color: #f8fafc;
      }

      .pad button:hover {
        background: rgba(248, 250, 252, 0.2);
      }

      .pad .up {
        grid-column: 2;
      }

      .pad .left {
        grid-column: 1;
      }

      .pad .down {
        grid-column: 2;
      }

      .pad .right {
        grid-column: 3;
      }

      .status {
        min-height: 1.5rem;
        margin: 0;
        color: #cbd5e1;
        text-align: center;
        font-weight: 700;
      }

      .pause-menu {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 1rem;
        background: rgba(2, 6, 23, 0.74);
        opacity: 0;
        pointer-events: none;
        transition: opacity 160ms ease;
      }

      .pause-menu.open {
        opacity: 1;
        pointer-events: auto;
      }

      .pause-panel {
        width: min(88vw, 320px);
        display: grid;
        gap: 0.75rem;
        padding: 1rem;
        border: 1px solid rgba(248, 250, 252, 0.18);
        border-radius: 8px;
        background: #111827;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
      }

      .pause-panel h2 {
        margin: 0 0 0.25rem;
        font-size: 1.5rem;
        text-align: center;
      }

      .game-options {
        display: none;
        gap: 0.75rem;
      }

      .game-options.open {
        display: grid;
      }

      .game-list {
        display: none;
        gap: 0.75rem;
      }

      .game-list.open {
        display: grid;
      }

      .room-form {
        display: grid;
        gap: 0.75rem;
      }

      input,
      select {
        width: 100%;
        min-height: 44px;
        border: 1px solid rgba(248, 250, 252, 0.22);
        border-radius: 8px;
        padding: 0.7rem 0.95rem;
        background: #020617;
        color: #f8fafc;
        font: inherit;
        font-weight: 700;
        text-align: center;
        text-transform: uppercase;
      }

      .room-code {
        min-height: 1.4rem;
        margin: 0;
        color: #5eead4;
        text-align: center;
        font-weight: 800;
      }

      .room-note {
        min-height: 1.4rem;
        margin: 0;
        color: #cbd5e1;
        text-align: center;
        font-size: 0.95rem;
        font-weight: 700;
      }

      .account-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        color: #cbd5e1;
        font-weight: 800;
      }

      .account-bar button {
        min-height: 36px;
        padding: 0.45rem 0.75rem;
      }

      .auth-menu {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: none;
        place-items: center;
        padding: 1rem;
        background: rgba(2, 6, 23, 0.84);
      }

      .auth-menu.open {
        display: grid;
      }

      .auth-panel {
        width: min(88vw, 360px);
        display: grid;
        gap: 0.75rem;
        padding: 1rem;
        border: 1px solid rgba(248, 250, 252, 0.18);
        border-radius: 8px;
        background: #111827;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
      }

      .auth-panel h2 {
        margin: 0 0 0.25rem;
        text-align: center;
      }

      .auth-panel input {
        text-transform: none;
      }

      .account-tools {
        display: grid;
        gap: 0.75rem;
      }

      .auth-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }

      .admin-panel {
        display: none;
        gap: 0.75rem;
        padding: 1rem;
        border: 1px solid rgba(248, 250, 252, 0.18);
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.72);
      }

      .admin-panel.open {
        display: grid;
      }

      .admin-panel h2 {
        margin: 0;
        font-size: 1.25rem;
      }

      .admin-stats {
        display: grid;
        gap: 0.4rem;
        color: #cbd5e1;
        font-weight: 800;
      }

      .admin-users {
        max-height: 8rem;
        overflow: auto;
        display: grid;
        gap: 0.35rem;
        color: #f8fafc;
        font-weight: 700;
      }

      .admin-points {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 0.75rem;
      }

      .admin-points select {
        text-transform: none;
      }

      .settings-controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }

      .settings-actions {
        display: grid;
        gap: 0.75rem;
      }

      .settings-account {
        display: grid;
        gap: 0.75rem;
      }

      .settings-controls label {
        display: grid;
        gap: 0.35rem;
        color: #cbd5e1;
        font-weight: 800;
      }

      .settings-controls select {
        text-transform: none;
      }

      @media (max-width: 560px) {
        header {
          align-items: stretch;
          flex-direction: column;
        }

        .scoreboard {
          justify-content: space-between;
        }

        .stat {
          flex: 1;
        }

        .admin-points {
          grid-template-columns: 1fr;
        }

        .settings-controls {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="account-bar">
        <span id="accountStatus">Not logged in</span>
        <button type="button" id="logoutButton" hidden>Log out</button>
      </div>

      <section class="admin-panel" id="adminPanel" aria-label="Admin panel">
        <h2>Admin Panel</h2>
        <div class="admin-stats">
          <span id="adminRoomCount">Rooms: 0</span>
        </div>
        <div class="admin-points">
          <select id="pointsTargetSelect" aria-label="Points target">
            <option value="local">Current game</option>
          </select>
          <input id="pointsInput" type="number" min="1" value="1" aria-label="Points amount">
          <button type="button" id="addPointsButton">Add Points</button>
        </div>
        <button type="button" id="refreshAdminButton">Refresh</button>
        <button type="button" id="clearRoomsButton">Clear Rooms</button>
        <p class="room-note" id="adminMessage"></p>
      </section>

      <header>
        <h1 id="gameTitle">Snake</h1>
        <div class="scoreboard" id="localScoreboard" aria-label="Scoreboard">
          <div class="stat">Score <span id="score">0</span></div>
          <div class="stat">Best <span id="best">0</span></div>
        </div>
        <div class="scoreboard" id="onlineScoreboard" aria-label="Online scoreboard" hidden>
          <div class="stat"><strong id="playerOneName">P1</strong><span id="playerOneScore">0</span></div>
          <div class="stat"><strong id="playerTwoName">P2</strong><span id="playerTwoScore">0</span></div>
        </div>
      </header>

      <section class="game" aria-label="Snake game">
        <canvas id="board" width="560" height="560"></canvas>
        <div class="play-overlay" id="playOverlay" aria-hidden="true">
          <div class="play-panel">
            <h2 id="playTitle">Snake</h2>
            <p id="playMessage"></p>
            <button type="button" id="playButton">Play</button>
            <button type="button" id="cancelWaitButton" hidden>Leave Room</button>
          </div>
        </div>
        <p class="status" id="status">Use arrow keys or WASD to play.</p>
        <div class="controls">
          <button type="button" id="restart">Restart</button>
          <button type="button" id="shootButton">Shoot</button>
          <button type="button" id="pause">Menu</button>
        </div>
        <div class="pad" aria-label="Touch controls">
          <button type="button" class="up" data-direction="up" aria-label="Move up">Up</button>
          <button type="button" class="left" data-direction="left" aria-label="Move left">Left</button>
          <button type="button" class="down" data-direction="down" aria-label="Move down">Down</button>
          <button type="button" class="right" data-direction="right" aria-label="Move right">Right</button>
        </div>
      </section>
    </main>

    <div class="pause-menu" id="pauseMenu" aria-hidden="true">
      <div class="pause-panel" role="dialog" aria-modal="true" aria-labelledby="pauseTitle">
        <h2 id="pauseTitle">Menu</h2>
        <button type="button" id="resume">Close Menu</button>
        <button type="button" id="leaveRoom" hidden>Leave Room</button>
        <button type="button" id="back" hidden>Back</button>
        <button type="button" id="games">Games</button>
        <button type="button" id="settings">Settings</button>
        <div class="game-options" id="gameOptions" aria-label="Game modes">
          <button type="button" id="singlePlayer">Single Player</button>
          <button type="button" id="online">Online</button>
        </div>
        <div class="game-list" id="settingsMenu" aria-label="Settings">
          <div class="settings-controls">
            <label>
              Sound
              <select id="soundSelect">
                <option value="on">On</option>
                <option value="off">Off</option>
              </select>
            </label>
            <label>
              Theme
              <select id="themeSelect">
                <option value="midnight">Midnight</option>
                <option value="forest">Forest</option>
                <option value="purple">Purple</option>
              </select>
            </label>
            <label>
              Field Size
              <select id="fieldSizeSelect">
                <option value="normal">Normal</option>
                <option value="small">Small</option>
                <option value="large">Large</option>
              </select>
            </label>
            <label>
              Controls
              <select id="controlsSelect">
                <option value="all">WASD + Arrows</option>
                <option value="wasd">WASD</option>
                <option value="arrows">Arrows</option>
              </select>
            </label>
            <label>
              Skin
              <select id="skinSelect">
                <option value="classic">Classic</option>
                <option value="round">Round</option>
                <option value="neon">Neon</option>
                <option value="block">Block</option>
              </select>
            </label>
            <label>
              Color
              <select id="colorSelect">
                <option value="teal">Teal</option>
                <option value="green">Green</option>
                <option value="blue">Blue</option>
                <option value="purple">Purple</option>
                <option value="pink">Pink</option>
                <option value="orange">Orange</option>
              </select>
            </label>
          </div>
          <div class="settings-actions">
            <button type="button" id="resetRecordButton">Reset Record</button>
            <button type="button" id="accountSettingsButton">Account</button>
            <div class="settings-account" aria-label="Account recovery">
              <input id="settingsGmailInput" type="email" maxlength="64" placeholder="Gmail" autocomplete="email">
              <input id="settingsCurrentPasswordInput" type="password" maxlength="32" placeholder="Current password for Gmail recovery" autocomplete="current-password">
              <button type="button" id="settingsSaveGmailButton">Save Gmail</button>
              <input id="settingsRecoveryGmailInput" type="email" maxlength="64" placeholder="Recovery Gmail" autocomplete="email">
              <button type="button" id="settingsSendRecoveryEmailButton">Send Recovery Email</button>
            </div>
            <p class="room-note" id="settingsMessage"></p>
          </div>
        </div>
        <div class="game-list" id="singlePlayerGames" aria-label="Single player games">
          <button type="button" id="snakeClassic">Snake Classic</button>
          <button type="button" id="appleCatcher">Apple Catcher</button>
          <button type="button" id="dodgeBlocks">Gem Runner</button>
        </div>
        <div class="game-list" id="onlineGames" aria-label="Online games">
          <button type="button" class="selected" data-online-game="online-snake">Online Snake</button>
          <button type="button" data-online-game="online-tanks">Online Tanks</button>
          <button type="button" data-online-game="online-pong">Online Pong</button>
          <button type="button" data-online-game="online-racing">Online Racing</button>
          <button type="button" data-online-game="online-tag">Online Tag</button>
          <button type="button" data-online-game="online-soccer">Online Soccer</button>
          <button type="button" data-online-game="online-maze">Online Maze Race</button>
          <button type="button" data-online-game="online-battle">Online Battle Arena</button>
          <button type="button" id="createRoom">Create Room</button>
          <div class="room-form">
            <input id="roomCodeInput" type="text" maxlength="8" placeholder="Room code" aria-label="Room code">
            <button type="button" id="joinRoom">Join Room</button>
          </div>
          <p class="room-code" id="roomCode"></p>
          <p class="room-note" id="roomNote"></p>
        </div>
      </div>
    </div>

    <div class="auth-menu" id="authMenu" aria-hidden="true">
      <div class="auth-panel" role="dialog" aria-modal="true" aria-labelledby="authTitle">
        <h2 id="authTitle">Account</h2>
        <input id="usernameInput" type="text" maxlength="18" placeholder="Username" autocomplete="username">
        <input id="passwordInput" type="password" maxlength="32" placeholder="Password" autocomplete="current-password">
        <input id="gmailInput" type="email" maxlength="64" placeholder="Gmail" autocomplete="email">
        <div class="auth-actions">
          <button type="button" id="loginButton">Log in</button>
          <button type="button" id="registerButton">Register</button>
        </div>
        <div class="account-tools">
          <button type="button" id="saveGmailButton">Save Gmail</button>
          <input id="changeGmailInput" type="email" maxlength="64" placeholder="Gmail for password change" autocomplete="email">
          <button type="button" id="sendRecoveryEmailButton">Send Recovery Email</button>
        </div>
        <button type="button" id="accountBackButton">Back</button>
        <p class="room-note" id="authMessage"></p>
      </div>
    </div>

        if (gameSettings.controls === "arrows") {

      function playSound(type) {
        if (gameSettings.sound !== "on") {
          return;
        }

        try {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          const audioContext = new AudioContextClass();
          const oscillator = audioContext.createOscillator();
          const gain = audioContext.createGain();
          const tones = {
            point: 620,
            gameover: 180,
            shoot: 360
          };

          oscillator.frequency.value = tones[type] || 440;
          oscillator.type = "square";
          gain.gain.setValueAtTime(0.06, audioContext.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.12);
          oscillator.connect(gain);
          gain.connect(audioContext.destination);
          oscillator.start();
          oscillator.stop(audioContext.currentTime + 0.12);
        } catch {
          // Sound is optional.
        }
      }

      async function saveAccountGmail(source = "account") {
        const messageEl = source === "settings" ? settingsMessage : authMessage;
        const inputEl = source === "settings" ? settingsGmailInput : gmailInput;
        const buttonEl = source === "settings" ? settingsSaveGmailButton : saveGmailButton;
        const currentPassword = source === "settings"
          ? settingsCurrentPasswordInput.value
          : passwordInput.value;

        if (!currentAccount?.username) {
          messageEl.textContent = "Log in first.";
          return;
        }

        const gmail = normalizeGmail(inputEl.value);

        if (!gmail) {
          messageEl.textContent = "Enter Gmail like name@gmail.com.";
          return;
        }

        buttonEl.disabled = true;
        messageEl.textContent = "Saving Gmail...";

        try {
          const userKey = usernameKey(currentAccount.username);
          const user = await getUser(userKey);
          const patch = { gmail };

          if (!user?.authUid && currentPassword.length >= 4) {
            const passwordHash = await hashPassword(currentPassword);

            if (user?.passwordHash !== passwordHash) {
              messageEl.textContent = "Current password is wrong.";
              return;
            }

            const authUser = await createFirebaseEmailAccount(gmail, currentPassword);
            patch.authUid = authUser?.uid || "";
          }

          await patchUser(userKey, patch);
          gmailInput.value = gmail;
          settingsGmailInput.value = gmail;
          messageEl.textContent = patch.authUid
            ? "Gmail saved. Recovery email enabled."
            : "Gmail saved. Enter current password and save Gmail to enable email recovery.";
        } catch (error) {
          messageEl.textContent = `Could not save Gmail: ${error.code || "check Firebase/Auth settings"}.`;
        } finally {
          buttonEl.disabled = false;
        }
      }

      async function createFirebaseEmailAccount(gmail, password) {

        const credential = await firebaseAuth.createUserWithEmailAndPassword(gmail, password);
        return credential.user;

      async function signInFirebaseEmailAccount(gmail, password) {

      function makeDodgeBlock() {
        const size = 24 + Math.random() * 18;
        const speed = 2.2 + Math.random() * 1.8;

        return {
          x: 30 + Math.random() * (canvas.width - size - 60),
          y: 30 + Math.random() * (canvas.height - size - 60),
          size,
          dx: (Math.random() > 0.5 ? 1 : -1) * speed,
          dy: (Math.random() > 0.5 ? 1 : -1) * speed
        };
      }

      function placeDodgeGem() {
        do {
          dodgeGem = {
            x: 24 + Math.random() * (canvas.width - 48),
            y: 24 + Math.random() * (canvas.height - 48),
            size: 18
          };
        } while (
          Math.abs(dodgeGem.x - dodger.x) < 60 &&
          Math.abs(dodgeGem.y - dodger.y) < 60
        );
      }

      function resetApple() {
        apple = {

      function placeFood() {
        do {
          food = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)

        } while (snake.some((part) => part.x === food.x && part.y === food.y));

      function changeDirection(newDirection) {
        if (currentGame === "online-tanks") {
          const player = onlineState?.playersState?.[onlinePlayerSlot];

          if (player) {
            player.dir = newDirection;
            tankMove = 1;
            moveOnlineTank(player, 10);
          }

          return;
        }

        if (currentGame === "online-snake") {
          const player = onlineState?.playersState?.[onlinePlayerSlot];
          const currentDirection = player?.dir || onlineDirection;
          const reversing =
            newDirection.x + currentDirection.x === 0 &&
            newDirection.y + currentDirection.y === 0;

          if (!reversing) {
            onlineDirection = newDirection;
            onlineLocalDirty = true;
          }
          return;
        }

        if (currentGame === "online-catcher") {
          if (newDirection.x !== 0) {
            catcherMove = newDirection.x;
          }
          return;
        }

        if (currentGame === "online-pong") {
          if (newDirection.y !== 0) {
            pongMove = newDirection.y;
            onlineLocalDirty = true;
          }
          return;
        }

        if (isOnlineArcadeGame(currentGame)) {
          onlineMove = newDirection;
          onlineLocalDirty = true;
          return;
        }

        if (currentGame === "catcher") {
          if (newDirection.x !== 0) {
            catcherMove = newDirection.x;
            moveCatcher(catcherMove);
          }
          return;
        }

        if (currentGame === "dodger") {
          dodgeMove = newDirection;
          moveDodger();
          return;
        }

        const reversing =
          newDirection.x + direction.x === 0 &&
          newDirection.y + direction.y === 0;

        if (!reversing) {
          nextDirection = newDirection;
        }
      }

      function moveCatcher(amount) {
        if (waitingToPlay || paused || gameOver) {
          return;
        }
        catcher.x = Math.max(0, Math.min(canvas.width - catcher.width, catcher.x + amount * 9));
        draw();
      }

      function moveDodger() {
        if (waitingToPlay || paused || gameOver || !dodger) {
          return;
        }

        const speed = 5;
        dodger.x = Math.max(0, Math.min(canvas.width - dodger.size, dodger.x + dodgeMove.x * speed));
        dodger.y = Math.max(0, Math.min(canvas.height - dodger.size, dodger.y + dodgeMove.y * speed));
        draw();
      }

      function tickSnake() {
        if (waitingToPlay || paused || gameOver) {
          return;
        }

        direction = nextDirection;
        const head = {
          x: snake[0].x + direction.x,
          y: snake[0].y + direction.y
        };

        const hitWall =
          head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount;
        const hitSelf = snake.some((part) => part.x === head.x && part.y === head.y);

        if (hitWall || hitSelf) {
          endGame();
          return;
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
          addPoint();
          placeFood();
        } else {
          snake.pop();
        }

        draw();
      }

      function tickCatcher() {
        if (waitingToPlay || paused || gameOver) {
          return;
        }

        if (catcherMove !== 0) {
          moveCatcher(catcherMove);
        }

        apple.y += apple.speed;
        const caught =
          apple.y + apple.size >= catcher.y &&
          apple.y <= catcher.y + catcher.height &&
          apple.x + apple.size >= catcher.x &&
          apple.x <= catcher.x + catcher.width;

        if (caught) {
          addPoint();
          resetApple();
        } else if (apple.y > canvas.height) {
          endGame();
          return;
        }

        draw();
      }

      function tickDodger() {
        if (waitingToPlay || paused || gameOver) {
          return;
        }

        moveDodger();
        dodgeTicks += 1;

        dodgeBlocks = dodgeBlocks.map((block) => {
          const nextBlock = {
            ...block,
            x: block.x + block.dx,
            y: block.y + block.dy
          };

          if (nextBlock.x <= 0 || nextBlock.x + nextBlock.size >= canvas.width) {
            nextBlock.dx *= -1;
            nextBlock.x = Math.max(0, Math.min(canvas.width - nextBlock.size, nextBlock.x));
          }

          if (nextBlock.y <= 0 || nextBlock.y + nextBlock.size >= canvas.height) {
            nextBlock.dy *= -1;
            nextBlock.y = Math.max(0, Math.min(canvas.height - nextBlock.size, nextBlock.y));
          }

          return nextBlock;
        });

        const hit = dodgeBlocks.some((block) =>
          dodger.x < block.x + block.size &&
          dodger.x + dodger.size > block.x &&
          dodger.y < block.y + block.size &&
          dodger.y + dodger.size > block.y
        );

        if (hit) {
          endGame();
          return;
        }

        const collectedGem =
          dodger.x < dodgeGem.x + dodgeGem.size &&
          dodger.x + dodger.size > dodgeGem.x &&
          dodger.y < dodgeGem.y + dodgeGem.size &&
          dodger.y + dodger.size > dodgeGem.y;

        if (collectedGem) {
          addPoint();
          placeDodgeGem();

          if (score > 0 && score % 4 === 0 && dodgeBlocks.length < 8) {
            dodgeBlocks.push(makeDodgeBlock());
          }
        }

        draw();
      }

      function addPoint() {
        score += 1;

        playSound("point");
        if (score > best) {

      function draw() {
        drawBoard();
        if (currentGame === "snake") {
          drawSnake();
        } else if (currentGame === "catcher") {
          drawCatcher();
        } else if (currentGame === "dodger") {
          drawDodger();
        } else {
          drawOnlineGame();
        }
      }

      function drawBoard() {
        ctx.fillStyle = getBoardColor();
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = "rgba(148, 163, 184, 0.12)";
        ctx.lineWidth = 1;
        for (let line = 0; line <= tileCount; line += 1) {
          const position = line * gridSize;
          ctx.beginPath();
          ctx.moveTo(position, 0);
          ctx.lineTo(position, canvas.height);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, position);
          ctx.lineTo(canvas.width, position);
          ctx.stroke();
        }
      }

      function drawSnake() {
        ctx.fillStyle = "#f97316";
        roundTile(food.x, food.y, 7);

        const theme = getTheme(playerStyle.color);
        snake.forEach((part, index) => {
          drawSnakeTile(part, index === 0 ? theme.head : theme.body, playerStyle.skin, index === 0);
        });
      }

      function drawCatcher() {
        const theme = getTheme(playerStyle.color);

        ctx.fillStyle = "#f97316";
        ctx.beginPath();
        ctx.arc(apple.x, apple.y, apple.size, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = theme.body;
        ctx.beginPath();
        ctx.roundRect(catcher.x, catcher.y, catcher.width, catcher.height, 8);
        ctx.fill();

        ctx.fillStyle = theme.head;
        ctx.beginPath();
        ctx.roundRect(catcher.x + 14, catcher.y - 12, catcher.width - 28, 14, 7);
        ctx.fill();
      }

      function drawDodger() {
        const theme = getTheme(playerStyle.color);

        if (dodgeGem) {
          ctx.fillStyle = "#facc15";
          ctx.beginPath();
          ctx.moveTo(dodgeGem.x + dodgeGem.size / 2, dodgeGem.y);
          ctx.lineTo(dodgeGem.x + dodgeGem.size, dodgeGem.y + dodgeGem.size / 2);
          ctx.lineTo(dodgeGem.x + dodgeGem.size / 2, dodgeGem.y + dodgeGem.size);
          ctx.lineTo(dodgeGem.x, dodgeGem.y + dodgeGem.size / 2);
          ctx.closePath();
          ctx.fill();
        }

        ctx.fillStyle = "#ef4444";
        dodgeBlocks.forEach((block) => {
          ctx.beginPath();
          ctx.arc(block.x + block.size / 2, block.y + block.size / 2, block.size / 2, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#fecaca";
          ctx.beginPath();
          ctx.arc(block.x + block.size / 2, block.y + block.size / 2, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#ef4444";
        });

        ctx.fillStyle = theme.body;
        ctx.beginPath();
        ctx.roundRect(dodger.x, dodger.y, dodger.size, dodger.size, playerStyle.skin === "block" ? 3 : 10);
        ctx.fill();

        ctx.fillStyle = theme.head;
        ctx.beginPath();
        ctx.arc(dodger.x + dodger.size / 2, dodger.y + dodger.size / 2, 7, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawSnakeTile(part, color, skin, isHead) {
        const radiusBySkin = {
          classic: isHead ? 7 : 5,
          round: 9,
          neon: 8,
          block: 2
        };

        ctx.save();
        ctx.fillStyle = color;

        if (skin === "neon") {
          ctx.shadowColor = color;
          ctx.shadowBlur = 14;
        }

        roundTile(part.x, part.y, radiusBySkin[skin] ?? 5);

        if (skin === "block") {
          ctx.strokeStyle = "rgba(248, 250, 252, 0.24)";
          ctx.lineWidth = 2;
          strokeTile(part.x, part.y, 2);
        }

        ctx.restore();
      }

      function roundTile(x, y, radius) {
        const inset = 2;
        const left = x * gridSize + inset;
        const top = y * gridSize + inset;
        const size = gridSize - inset * 2;

        ctx.beginPath();
        ctx.roundRect(left, top, size, size, radius);
        ctx.fill();
      }

      function strokeTile(x, y, radius) {
        const inset = 2;
        const left = x * gridSize + inset;
        const top = y * gridSize + inset;
        const size = gridSize - inset * 2;

        ctx.beginPath();
        ctx.roundRect(left, top, size, size, radius);
        ctx.stroke();
      }

      document.addEventListener("keydown", (event) => {
        if (isTypingField(event.target)) {
          return;
        }

        const keys = {
          ArrowUp: { x: 0, y: -1 },
          w: { x: 0, y: -1 },
          W: { x: 0, y: -1 },
          ArrowDown: { x: 0, y: 1 },
          s: { x: 0, y: 1 },
          S: { x: 0, y: 1 },
          ArrowLeft: { x: -1, y: 0 },
          a: { x: -1, y: 0 },
          A: { x: -1, y: 0 },
          ArrowRight: { x: 1, y: 0 },
          d: { x: 1, y: 0 },
          D: { x: 1, y: 0 }
        };

        if (keys[event.key] && isKeyAllowedForControls(event.key)) {
          event.preventDefault();
          changeDirection(keys[event.key]);
        }

        if (event.key === " ") {
          event.preventDefault();
          if (currentGame === "online-tanks") {
            shootOnlineTank();
          } else {
            togglePause();
          }
        }
      });

      document.addEventListener("keyup", (event) => {
        if (isTypingField(event.target)) {
          return;
        }

        if (currentGame === "online-tanks") {
          const movementKey = ["ArrowUp", "w", "W", "ArrowDown", "s", "S", "ArrowLeft", "a", "A", "ArrowRight", "d", "D"].includes(event.key) &&
            isKeyAllowedForControls(event.key);

          if (movementKey) {
            tankMove = 0;
          }

          return;
        }

        if (currentGame === "online-pong") {
          const upReleased = ["ArrowUp", "w", "W"].includes(event.key) && pongMove < 0;
          const downReleased = ["ArrowDown", "s", "S"].includes(event.key) && pongMove > 0;

          if ((upReleased || downReleased) && isKeyAllowedForControls(event.key)) {
            pongMove = 0;
            onlineLocalDirty = true;
          }

          return;
        }

        if (isOnlineArcadeGame(currentGame)) {
          const leftReleased = ["ArrowLeft", "a", "A"].includes(event.key) && onlineMove.x < 0;
          const rightReleased = ["ArrowRight", "d", "D"].includes(event.key) && onlineMove.x > 0;
          const upReleased = ["ArrowUp", "w", "W"].includes(event.key) && onlineMove.y < 0;
          const downReleased = ["ArrowDown", "s", "S"].includes(event.key) && onlineMove.y > 0;

          if ((leftReleased || rightReleased || upReleased || downReleased) && isKeyAllowedForControls(event.key)) {
            onlineMove = { x: 0, y: 0 };
            onlineLocalDirty = true;
          }

          return;
        }

        if (currentGame === "dodger") {
          const leftReleased = ["ArrowLeft", "a", "A"].includes(event.key) && dodgeMove.x < 0;
          const rightReleased = ["ArrowRight", "d", "D"].includes(event.key) && dodgeMove.x > 0;
          const upReleased = ["ArrowUp", "w", "W"].includes(event.key) && dodgeMove.y < 0;
          const downReleased = ["ArrowDown", "s", "S"].includes(event.key) && dodgeMove.y > 0;

          if (leftReleased || rightReleased || upReleased || downReleased) {
            dodgeMove = { x: 0, y: 0 };
          }

          return;
        }

        if (currentGame !== "catcher" && currentGame !== "online-catcher") {
          return;
        }

        const leftReleased = ["ArrowLeft", "a", "A"].includes(event.key) && catcherMove < 0;
        const rightReleased = ["ArrowRight", "d", "D"].includes(event.key) && catcherMove > 0;

        if (leftReleased || rightReleased) {
          catcherMove = 0;
        }
      });

      function sanitizeUsername(value) {
        return value.trim().replace(/[^a-zA-Z0-9_-]/g, "");

      function usernameKey(value) {
        return sanitizeUsername(value).toLowerCase();

      function normalizeGmail(value) {
        const gmail = value.trim().toLowerCase();
        return /^[^\s@]+@gmail\.com$/.test(gmail) ? gmail : "";
      }

      async function hashPassword(password) {
        const data = new TextEncoder().encode(password);
        const hashBuffer = await crypto.subtle.digest("SHA-256", data);
        return Array.from(new Uint8Array(hashBuffer))
          .map((byte) => byte.toString(16).padStart(2, "0"))
          .join("");
      }

      async function syncBestScoresFromAccount() {
        if (!currentAccount?.username) {
          return;
        }

        try {
          const user = await getUser(usernameKey(currentAccount.username));
          const remoteScores = user?.bestScores || {};
          const localScores = getLocalBestScores();
          const mergedScores = {
            snake: Math.max(Number(remoteScores.snake || 0), localScores.snake),
            catcher: Math.max(Number(remoteScores.catcher || 0), localScores.catcher),
            dodger: Math.max(Number(remoteScores.dodger || 0), localScores.dodger)
          };

          setLocalBestScore("snake", mergedScores.snake);
          setLocalBestScore("catcher", mergedScores.catcher);
          setLocalBestScore("dodger", mergedScores.dodger);

          await patchUser(usernameKey(currentAccount.username), {
            bestScores: mergedScores
          });

          if (isSinglePlayerGame(currentGame)) {
            best = mergedScores[currentGame] || 0;
            bestEl.textContent = best;
          }
        } catch {
          statusEl.textContent = "Could not load cloud records.";
        }
      }

      async function createUserIfAvailable(username, user) {
        const checkResponse = await fetch(`${firebaseDatabaseUrl}/users/${username}.json`, {
          headers: {
            "X-Firebase-ETag": "true"
          }
        });

        if (!checkResponse.ok) {
          throw new Error("Could not check username.");
        }

        const existingUser = await checkResponse.json();

        if (existingUser) {
          return false;
        }

        const etag = checkResponse.headers.get("ETag");
        const createResponse = await fetch(`${firebaseDatabaseUrl}/users/${username}.json`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "If-Match": etag
          },
          body: JSON.stringify(user)
        });

        if (createResponse.status === 412) {
          return false;
        }

        if (!createResponse.ok) {
          throw new Error("Could not save account.");
        }

        return true;
      }
