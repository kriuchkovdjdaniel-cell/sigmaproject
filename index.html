      async function addAdminPoint() {
        if (!currentAccount?.isAdmin) {
          return;
        }

        const points = Math.max(1, Math.floor(Number(pointsInput.value) || 1));
        pointsInput.value = points;

        if (currentGame.startsWith("online-")) {
          const targetSlot = pointsTargetSelect.value || onlinePlayerSlot;

          if (!onlineRoomCode || !targetSlot || !onlineState?.playersState?.[targetSlot]) {
            adminMessage.textContent = "No online player to add points to.";
            return;
          }

          const player = onlineState.playersState[targetSlot];
          player.adminPoints = (player.adminPoints || 0) + points;

          if (targetSlot === onlinePlayerSlot) {
            score = getPlayerTotalScore(player);
            scoreEl.textContent = score;
          }

          updateOnlineScoreboard();
          adminMessage.textContent = `Added ${points} points to ${player.username || targetSlot.toUpperCase()}.`;

          try {
            await patchRoom(onlineRoomCode, {
              [`playersState/${targetSlot}/adminPoints`]: player.adminPoints,
              updatedAt: Date.now()
            });
          } catch {
            adminMessage.textContent = "Point added locally, but Firebase sync failed.";
          }

          return;
        }

        score += points;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          saveBestScore(currentGame, best);
        }
        adminMessage.textContent = `Added ${points} points.`;
      }

      async function registerAccount() {
        const username = sanitizeUsername(usernameInput.value);
        const userKey = usernameKey(username);
        const password = passwordInput.value;
        const gmail = gmailInput.value ? normalizeGmail(gmailInput.value) : "";

        if (username.length < 3 || password.length < 4) {
          authMessage.textContent = "Use 3+ username letters and 4+ password letters.";
          return;
        }

        if (gmailInput.value && !gmail) {
          authMessage.textContent = "Gmail must look like name@gmail.com.";
          return;
        }

        loginButton.disabled = true;
        registerButton.disabled = true;
        authMessage.textContent = "Creating account...";

        try {
          if (await getUser(userKey)) {
            authMessage.textContent = "Username already exists.";
            return;
          }

          const passwordHash = await hashPassword(password);
          let authUid = "";

          if (gmail) {
            const authUser = await createFirebaseEmailAccount(gmail, password);
            authUid = authUser?.uid || "";
          }

          const created = await createUserIfAvailable(userKey, {
            username,
            passwordHash,
            gmail,
            authUid,
            bestScores: getLocalBestScores(),
            createdAt: Date.now()
          });

          if (!created) {
            authMessage.textContent = "Username already exists.";
            return;
          }

          passwordInput.value = "";
          settingsGmailInput.value = gmail;
          authMessage.textContent = "";
          setStoredAccount({ username, isAdmin: false });
          syncBestScoresFromAccount();
        } catch {
          authMessage.textContent = "Could not register. Check Firebase rules.";
        } finally {
          loginButton.disabled = false;
          registerButton.disabled = false;
        }
      }

      async function loginAccount() {
        const username = sanitizeUsername(usernameInput.value);
        const userKey = usernameKey(username);
        const password = passwordInput.value;

        if (!username || !password) {
          authMessage.textContent = "Enter username and password.";
          return;
        }

        loginButton.disabled = true;
        registerButton.disabled = true;
        authMessage.textContent = "Logging in...";

        try {
          const user = await getUser(userKey);
          const passwordHash = await hashPassword(password);
          let firebaseLoginOk = false;

          if (user?.gmail && user?.authUid) {
            try {
              await signInFirebaseEmailAccount(user.gmail, password);
              firebaseLoginOk = true;
            } catch {
              firebaseLoginOk = false;
            }
          }

          if (!user || (!firebaseLoginOk && user.passwordHash !== passwordHash)) {
            authMessage.textContent = "Wrong username or password.";
            return;
          }

          if (firebaseLoginOk && user.passwordHash !== passwordHash) {
            await patchUser(userKey, { passwordHash });
          }

          passwordInput.value = "";
          gmailInput.value = user.gmail || "";
          settingsGmailInput.value = user.gmail || "";
          authMessage.textContent = "";
          setStoredAccount({
            username: user.username || username,
            isAdmin: Boolean(user.isAdmin)
          });
          syncBestScoresFromAccount();
        } catch {
          authMessage.textContent = "Could not log in. Check Firebase rules.";
        } finally {
          loginButton.disabled = false;
          registerButton.disabled = false;
        }
      }

      function getOwnedRoomCodes() {
        try {
          return JSON.parse(localStorage.getItem(ownedRoomsStorageKey) || "[]");
        } catch {
          return [];
        }
      }

      function saveOwnedRoomCode(code) {
        const ownedCodes = getOwnedRoomCodes();

        if (!ownedCodes.includes(code)) {
          ownedCodes.push(code);
        }

        try {
          localStorage.setItem(ownedRoomsStorageKey, JSON.stringify(ownedCodes));
        } catch {
          // Same-session createdRoomCode still prevents joining your own room.
        }
      }

      async function generateRoomCode() {
        let code;
        let existingRoom;

        do {
          code = `CODE${Math.floor(1000 + Math.random() * 9000)}`;
          existingRoom = await getRoom(code);
        } while (existingRoom);

        return code;
      }

      function makeOnlinePlayer(slot, gameName) {
        const username = currentAccount?.username || slot.toUpperCase();
        const skin = playerStyle.skin;
        const color = playerStyle.color;

        if (gameName === "online-tanks") {
          return {
            username,
            skin,
            color,
            x: slot === "p1" ? 140 : 380,
            y: slot === "p1" ? 280 : 280,
            dir: slot === "p1" ? { x: 1, y: 0 } : { x: -1, y: 0 },
            score: 0,
            alive: true,
            bullets: []
          };
        }

        if (gameName === "online-catcher") {
          return {
            username,
            skin,
            color,
            x: slot === "p1" ? 136 : 328,
            y: canvas.height - 44,
            score: 0,
            alive: true
          };
        }

        if (gameName === "online-pong") {
          return {
            username,
            skin,
            color,
            x: slot === "p1" ? 34 : canvas.width - 50,
            y: canvas.height / 2 - 42,
            width: 16,
            height: 84,
            score: 0,
            alive: true
          };
        }

        if (isOnlineArcadeGame(gameName)) {
          const starts = {
            "online-racing": {
              p1: { x: 200, y: canvas.height - 54 },
              p2: { x: 320, y: canvas.height - 54 }
            },
            "online-tag": {
              p1: { x: 150, y: canvas.height / 2 },
              p2: { x: canvas.width - 170, y: canvas.height / 2 }
            },
            "online-soccer": {
              p1: { x: 100, y: canvas.height / 2 },
              p2: { x: canvas.width - 120, y: canvas.height / 2 }
            },
            "online-maze": {
              p1: { x: 34, y: canvas.height - 52 },
              p2: { x: 70, y: canvas.height - 52 }
            },
            "online-battle": {
              p1: { x: 120, y: canvas.height / 2 },
              p2: { x: canvas.width - 140, y: canvas.height / 2 }
            }
          };
          const start = starts[gameName]?.[slot] || { x: slot === "p1" ? 120 : canvas.width - 140, y: canvas.height / 2 };

          return {
            username,
            skin,
            color,
            x: start.x,
            y: start.y,
            size: 28,
            score: 0,
            alive: true,
            powered: false
          };
        }

        return {
          username,
          skin,
          color,
          snake: slot === "p1"
            ? [{ x: 7, y: 10 }, { x: 6, y: 10 }, { x: 5, y: 10 }]
            : [{ x: 20, y: 10 }, { x: 21, y: 10 }, { x: 22, y: 10 }],
          dir: slot === "p1" ? { x: 1, y: 0 } : { x: -1, y: 0 },
          score: 0,
          alive: true
        };
      }

      function makeOnlineFood(blockedCells = []) {
        let foodItem;
        let attempts = 0;

        do {
          foodItem = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)
          };
          attempts += 1;
        } while (
          attempts < 200 &&
          blockedCells.some((cell) => cell.x === foodItem.x && cell.y === foodItem.y)
        );

        return foodItem;
      }

      function makeOnlineFoods(state = null) {
        const foods = [];

        while (foods.length < 4) {
          foods.push(makeOnlineFood([...getOnlineSnakeBlockedCells(state), ...foods]));
        }

        return foods;
      }

      function makeOnlineApple() {
        return {
          x: 24 + Math.random() * (canvas.width - 48),
          y: -24 - Math.random() * 260,
          size: 18,
          speed: 3.4 + Math.random() * 1.6
        };
      }

      function makeOnlineApples() {
        return Array.from({ length: 4 }, () => makeOnlineApple());
      }

      function makeOnlinePongBall(direction = 1) {
        const ySpeed = Math.random() > 0.5 ? 3.2 : -3.2;

        return {
          x: canvas.width / 2,
          y: canvas.height / 2,
          size: 14,
          dx: 5 * direction,
          dy: ySpeed
        };
      }

      function isOnlineArcadeGame(gameName) {
        return [
          "online-racing",
          "online-tag",
          "online-soccer",
          "online-maze",
          "online-battle"
        ].includes(gameName);
      }

      function makeOnlineSoccerBall() {
        return {
          x: canvas.width / 2,
          y: canvas.height / 2,
          size: 18,
          dx: 0,
          dy: 0
        };
      }

      function makeOnlineArenaItem() {
        return {
          x: 40 + Math.random() * (canvas.width - 80),
          y: 40 + Math.random() * (canvas.height - 80),
          size: 18
        };
      }

      function makeOnlineMazeGoal() {
        return {
          x: canvas.width - 56,
          y: 34,
          size: 22
        };
      }

      function getOnlineTickDelay(gameName) {
        return gameName === "online-snake" ? 220 : 35;
      }

      function getOnlinePushDelay() {
        return currentGame === "online-snake" ? 180 : 90;
      }

      function unsubscribeFromRoom() {
        if (onlineRoomUnsubscribe) {
          onlineRoomUnsubscribe();
          onlineRoomUnsubscribe = null;
        }
      }

      function subscribeToRoom(code, onRoom) {
        unsubscribeFromRoom();
        const roomRef = firebaseDb.ref(`rooms/${code}`);
        const handler = (snapshot) => {
          onRoom(snapshot.val());
        };

        roomRef.on("value", handler, () => {
          statusEl.textContent = "Online live sync failed. Check Firebase rules or connection.";
        });
        onlineRoomUnsubscribe = () => roomRef.off("value", handler);
      }

      function closeOnlineRoomLocally(message = "Online room closed.") {
        clearInterval(timer);
        clearInterval(waitingTimer);
        unsubscribeFromRoom();
        onlineRoomCode = "";
        onlinePlayerSlot = "";
        onlineState = null;
        onlinePushBusy = false;
        waitingToPlay = false;
        gameOver = true;
        hidePlayOverlay();
        showLocalScoreboard();
        startGame("snake");
        statusEl.textContent = message;
      }

      async function beginOnlineRoom(code, gameName, slot, room) {
        clearInterval(timer);
        clearInterval(waitingTimer);
        unsubscribeFromRoom();
        onlineRoomCode = code;
        onlinePlayerSlot = slot;
        currentGame = gameName;
        updateShootButton();
        gameTitle.textContent = onlineGameNames[gameName] || games[gameName].title;
        showOnlineScoreboard();
        best = 0;
        score = 0;
        scoreEl.textContent = "0";
        bestEl.textContent = "0";
        gameOver = false;
        paused = false;
        waitingToPlay = false;
        updateShootButton();
        updatePauseButton();
        hidePlayOverlay();
        pauseButton.textContent = "Menu";
        pauseMenu.classList.remove("open");
        pauseMenu.setAttribute("aria-hidden", "true");
        resetPauseMenu();

        onlineState = prepareOnlineState(room, gameName, slot);
        updateOnlineScoreboard();
        onlineDirection = onlineState.playersState[slot]?.dir || { x: 1, y: 0 };
        onlinePushBusy = false;
        lastOnlinePush = 0;
        lastOnlineHeartbeat = 0;
        lastOnlineSnakeMove = 0;
        onlineLocalDirty = true;
        onlineFoodsDirty = false;
        onlineApplesDirty = false;
        onlinePongDirty = false;
        onlineSharedDirty = false;
        tankMove = 0;
        pongMove = 0;
        onlineMove = { x: 0, y: 0 };
        lastTankShot = 0;
        statusEl.textContent =
          `${slot === "p1" ? "Player 1" : "Player 2"} in ${gameTitle.textContent}. Room ${code}.`;
        await saveRoom(code, onlineState);
        subscribeToRoom(code, (latestRoom) => {
          if (!onlineRoomCode || code !== onlineRoomCode) {
            return;
          }

          if (!latestRoom) {
            closeOnlineRoomLocally("Online room closed.");
            return;
          }

          mergeOnlineState(latestRoom);
          updateOnlineScoreboard();
        });
        drawOnlineGame();
        timer = setInterval(tickOnlineGame, getOnlineTickDelay(gameName));
      }

      function prepareOnlineState(room, gameName, slot) {
        const state = {
          ...room,
          game: gameName,
          gameName: onlineGameNames[gameName],
          playersState: {
            ...(room.playersState || {})
          }
        };

        if (!state.playersState.p1) {
          state.playersState.p1 = makeOnlinePlayer("p1", gameName);
        }

        if (slot === "p2" && !state.playersState.p2) {
          state.playersState.p2 = makeOnlinePlayer("p2", gameName);
        }

        if (state.playersState.p1) {
          state.playersState.p1.username = state.playersState.p1.username || "P1";
        }

        if (state.playersState.p2) {
          state.playersState.p2.username = state.playersState.p2.username || "P2";
        }

        if (state.playersState[slot] && currentAccount?.username) {
          state.playersState[slot].username = currentAccount.username;
          state.playersState[slot].skin = playerStyle.skin;
          state.playersState[slot].color = playerStyle.color;
        }

        if (gameName === "online-snake") {
          state.foods = Array.isArray(state.foods)
            ? state.foods.slice(0, 4)
            : state.food
              ? [state.food]
              : [];

          while (state.foods.length < 4) {
            state.foods.push(makeOnlineFood([...getOnlineSnakeBlockedCells(state), ...state.foods]));
          }

          state.foods = state.foods.map((foodItem, index) => {
            const blockedCells = [
              ...getOnlineSnakeBlockedCells(state),
              ...state.foods.filter((_, foodIndex) => foodIndex !== index)
            ];
            const blocked = blockedCells.some((cell) => cell.x === foodItem.x && cell.y === foodItem.y);

            return blocked ? makeOnlineFood(blockedCells) : foodItem;
          });

          delete state.food;
        }

        if (gameName === "online-catcher") {
          state.apples = Array.isArray(state.apples)
            ? state.apples.slice(0, 4)
            : state.apple
              ? [state.apple]
              : [];

          while (state.apples.length < 4) {
            state.apples.push(makeOnlineApple());
          }

          delete state.apple;
        }

        if (gameName === "online-pong") {
          state.ball = state.ball || makeOnlinePongBall(onlinePlayerSlot === "p1" ? 1 : -1);
        }

        if (gameName === "online-soccer") {
          state.ball = state.ball || makeOnlineSoccerBall();
        }

        if (gameName === "online-tag") {
          state.tagger = state.tagger || "p1";
        }

        if (gameName === "online-maze") {
          state.goal = state.goal || makeOnlineMazeGoal();
        }

        if (gameName === "online-battle") {
          state.orb = state.orb || makeOnlineArenaItem();
          state.poweredSlot = state.poweredSlot || "";
        }

        return state;
      }

      function getOnlineSnakeBlockedCells(state = onlineState) {
        const playersState = state?.playersState || {};
        const p1Snake = playersState.p1?.snake || [];
        const p2Snake = playersState.p2?.snake || [];
        return [...p1Snake, ...p2Snake];
      }

      function ensureOnlineSnakeFoods() {
        if (!onlineState) {
          return;
        }

        onlineState.foods = Array.isArray(onlineState.foods) ? onlineState.foods.slice(0, 4) : [];

        while (onlineState.foods.length < 4) {
          onlineState.foods.push(makeOnlineFood([...getOnlineSnakeBlockedCells(), ...onlineState.foods]));
          onlineFoodsDirty = true;
        }

        onlineState.foods = onlineState.foods.map((foodItem, index) => {
          const blockedCells = [
            ...getOnlineSnakeBlockedCells(),
            ...onlineState.foods.filter((_, foodIndex) => foodIndex !== index)
          ];
          const blocked = blockedCells.some((cell) => cell.x === foodItem.x && cell.y === foodItem.y);

          if (blocked) {
            onlineFoodsDirty = true;
            return makeOnlineFood(blockedCells);
          }

          return foodItem;
        });
      }

      async function restartOnlineGame() {
        if (!onlineRoomCode || !onlinePlayerSlot) {
          startGame("snake");
          return;
        }

        try {
          const room = await getRoom(onlineRoomCode);

          if (!room) {
            startGame("snake");
            return;
          }

          onlineState = prepareOnlineState(room, currentGame, onlinePlayerSlot);
          const resetPlayer = makeOnlinePlayer(onlinePlayerSlot, currentGame);
          onlineState.playersState[onlinePlayerSlot] = resetPlayer;
          if (currentGame === "online-pong") {
            onlineState.ball = makeOnlinePongBall(onlinePlayerSlot === "p1" ? 1 : -1);
            onlinePongDirty = true;
          }
          if (currentGame === "online-soccer") {
            onlineState.ball = makeOnlineSoccerBall();
          }
          if (currentGame === "online-tag") {
            onlineState.tagger = "p1";
          }
          if (currentGame === "online-maze") {
            onlineState.goal = makeOnlineMazeGoal();
          }
          if (currentGame === "online-battle") {
            onlineState.orb = makeOnlineArenaItem();
            onlineState.poweredSlot = "";
            onlineState.playersState.p1.powered = false;
            if (onlineState.playersState.p2) {
              onlineState.playersState.p2.powered = false;
            }
          }
          onlineDirection = resetPlayer.dir || { x: 1, y: 0 };
          score = 0;
          scoreEl.textContent = "0";
          gameOver = false;
          paused = false;
          waitingToPlay = false;
          lastOnlineSnakeMove = 0;
          lastOnlineHeartbeat = 0;
          onlineLocalDirty = true;
          onlinePongDirty = currentGame === "online-pong";
          onlineSharedDirty = isOnlineArcadeGame(currentGame);
          tankMove = 0;
          pongMove = 0;
          onlineMove = { x: 0, y: 0 };
          lastTankShot = 0;
          hidePlayOverlay();
          pauseButton.textContent = "Menu";
          statusEl.textContent = `Restarted in room ${onlineRoomCode}.`;
          const restartPatch = {
            [`playersState/${onlinePlayerSlot}`]: resetPlayer,
            updatedAt: Date.now()
          };
          if (currentGame === "online-pong") {
            restartPatch.ball = onlineState.ball;
          }
          if (isOnlineArcadeGame(currentGame)) {
            restartPatch.ball = onlineState.ball || null;
            restartPatch.tagger = onlineState.tagger || null;
            restartPatch.goal = onlineState.goal || null;
            restartPatch.orb = onlineState.orb || null;
            restartPatch.poweredSlot = onlineState.poweredSlot || null;
          }
          await patchRoom(onlineRoomCode, restartPatch);
          updateOnlineScoreboard();
          drawOnlineGame();

          clearInterval(timer);
          timer = setInterval(tickOnlineGame, getOnlineTickDelay(currentGame));
        } catch {
          statusEl.textContent = "Could not restart online game.";
        }
      }

      function waitForSecondPlayer(code, gameName, room) {
        clearInterval(timer);
        clearInterval(waitingTimer);
        unsubscribeFromRoom();
        onlineRoomCode = code;
        onlinePlayerSlot = "p1";
        currentGame = gameName;
        updateShootButton();
        gameTitle.textContent = onlineGameNames[gameName];
        showOnlineScoreboard();
        scoreEl.textContent = "0";
        bestEl.textContent = "0";
        gameOver = false;
        paused = false;
        waitingToPlay = true;
        updateShootButton();
        updatePauseButton();
        resetPauseMenu();
        pauseMenu.classList.remove("open");
        pauseMenu.setAttribute("aria-hidden", "true");
        showWaitingOverlay(code, gameName);
        statusEl.textContent = `Room ${code}. Waiting for player 2.`;
        drawBoard();
        onlineState = prepareOnlineState(room, gameName, "p1");
        updateOnlineScoreboard();

        let startingRoom = false;
        subscribeToRoom(code, (latestRoom) => {
          if (!onlineRoomCode || code !== onlineRoomCode || startingRoom) {
            return;
          }

          if (!latestRoom) {
            closeOnlineRoomLocally("Room closed.");
            return;
          }

          onlineState = prepareOnlineState(latestRoom, gameName, "p1");
          updateOnlineScoreboard();

          if (latestRoom.players >= 2 && latestRoom.playersState?.p2) {
            startingRoom = true;
            waitingToPlay = false;
            updateShootButton();
            updatePauseButton();
            beginOnlineRoom(code, gameName, "p1", latestRoom).catch(() => {
              statusEl.textContent = "Could not start online room.";
            });
          }
        });
      }

      async function leaveOnlineRoom() {
        if (!onlineRoomCode) {
          startGame("snake");
          return;
        }

        const roomToLeave = onlineRoomCode;
        const slotToLeave = onlinePlayerSlot;
        const wasCreator = slotToLeave === "p1";

        clearInterval(timer);
        clearInterval(waitingTimer);
        unsubscribeFromRoom();
        leaveRoomButton.disabled = true;
        statusEl.textContent = "Leaving room...";

        try {
          if (wasCreator) {
            await deleteRoom(roomToLeave);
          } else {
            await patchRoom(roomToLeave, {
              players: 1,
              joinedBy: null,
              joinedAt: null,
              "playersState/p2": null,
              updatedAt: Date.now()
            });
          }
        } catch {
          statusEl.textContent = "Left locally. Could not update room server.";
        } finally {
          onlineRoomCode = "";
          onlinePlayerSlot = "";
          onlineState = null;
          catcherMove = 0;
          tankMove = 0;
          pongMove = 0;
          onlineMove = { x: 0, y: 0 };
          leaveRoomButton.disabled = false;
          startGame("snake");
        }
      }

      function tickOnlineGame() {
        if (paused || gameOver || !onlineRoomCode) {
          return;
        }

        if (currentGame === "online-snake") {
          ensureOnlineSnakeFoods();
          updateOnlineSnake();
        } else if (currentGame === "online-tanks") {
          updateOnlineTanks();
        } else if (currentGame === "online-pong") {
          updateOnlinePong();
        } else if (isOnlineArcadeGame(currentGame)) {
          updateOnlineArcade();
        } else {
          updateOnlineCatcher();
        }

        updateOnlineScoreboard();
        drawOnlineGame();
        syncOnlineState();
      }

      function syncOnlineState() {
        if (document.hidden || !onlineRoomCode || !onlineState) {
          return;
        }

        const now = Date.now();
        const pushDelay = getOnlinePushDelay();
        const shouldPush =
          onlineLocalDirty ||
          onlineFoodsDirty ||
          onlineApplesDirty ||
          onlinePongDirty ||
          onlineSharedDirty ||
          now - lastOnlineHeartbeat > 3200;

        if (shouldPush && !onlinePushBusy && now - lastOnlinePush > pushDelay) {
          lastOnlinePush = now;
          onlinePushBusy = true;
          const patch = buildOnlinePatch();
          const pushedFoods = Object.prototype.hasOwnProperty.call(patch, "foods");
          const pushedApples = Object.prototype.hasOwnProperty.call(patch, "apples");
          const pushedPong = Object.prototype.hasOwnProperty.call(patch, "ball");
          const pushedShared =
            (isOnlineArcadeGame(currentGame) && Object.prototype.hasOwnProperty.call(patch, "ball")) ||
            Object.prototype.hasOwnProperty.call(patch, "tagger") ||
            Object.prototype.hasOwnProperty.call(patch, "goal") ||
            Object.prototype.hasOwnProperty.call(patch, "orb") ||
            Object.prototype.hasOwnProperty.call(patch, "poweredSlot");

          patchRoom(onlineRoomCode, patch)
            .then(() => {
              if (pushedFoods) {
                onlineFoodsDirty = false;
              }
              if (pushedApples) {
                onlineApplesDirty = false;
              }
              if (pushedPong) {
                onlinePongDirty = false;
              }
              if (pushedShared) {
                onlineSharedDirty = false;
              }
              onlineLocalDirty = false;
              lastOnlineHeartbeat = Date.now();
            })
            .catch(() => {
              statusEl.textContent = "Online sync failed. Check Firebase rules or connection.";
            })
            .finally(() => {
              onlinePushBusy = false;
            });
        }
      }

      function buildOnlinePatch() {
        const patch = {
          updatedAt: Date.now()
        };

        const player = onlineState.playersState[onlinePlayerSlot];

        if (player) {
          Object.entries(player).forEach(([key, value]) => {
            if (key === "adminPoints") {
              return;
            }

            patch[`playersState/${onlinePlayerSlot}/${key}`] = value;
          });
        }

        if (currentGame === "online-snake") {
          ensureOnlineSnakeFoods();
          if (onlineFoodsDirty) {
            patch.foods = onlineState.foods || null;
            patch.food = null;
          }
        }

        if (currentGame === "online-catcher") {
          if (onlineApplesDirty) {
            patch.apples = onlineState.apples || null;
            patch.apple = null;
          }
        }

        if (currentGame === "online-pong" && onlinePongDirty) {
          patch.ball = onlineState.ball || null;
          if (onlineState.playersState.p1) {
            patch["playersState/p1/score"] = onlineState.playersState.p1.score || 0;
          }
          if (onlineState.playersState.p2) {
            patch["playersState/p2/score"] = onlineState.playersState.p2.score || 0;
          }
        }

        if (isOnlineArcadeGame(currentGame) && onlineSharedDirty) {
          if (currentGame === "online-soccer") {
            patch.ball = onlineState.ball || null;
          }
          if (currentGame === "online-tag") {
            patch.tagger = onlineState.tagger || "p1";
          }
          if (currentGame === "online-maze") {
            patch.goal = onlineState.goal || null;
          }
          if (currentGame === "online-battle") {
            patch.orb = onlineState.orb || null;
            patch.poweredSlot = onlineState.poweredSlot || null;
          }
          if (onlineState.playersState.p1) {
            patch["playersState/p1/score"] = onlineState.playersState.p1.score || 0;
            patch["playersState/p1/powered"] = Boolean(onlineState.playersState.p1.powered);
          }
          if (onlineState.playersState.p2) {
            patch["playersState/p2/score"] = onlineState.playersState.p2.score || 0;
            patch["playersState/p2/powered"] = Boolean(onlineState.playersState.p2.powered);
          }
        }

        return patch;
      }

      function mergeOnlineState(room) {
        const remoteState = prepareOnlineState(room, currentGame, onlinePlayerSlot);
        const otherSlot = onlinePlayerSlot === "p1" ? "p2" : "p1";
        const localPlayer = onlineState.playersState[onlinePlayerSlot];
        const remotePlayer = remoteState.playersState[onlinePlayerSlot];

        if (localPlayer && remotePlayer) {
          localPlayer.adminPoints = remotePlayer.adminPoints || 0;
          localPlayer.username = remotePlayer.username || localPlayer.username;
          if ((currentGame === "online-pong" && !onlinePongDirty) || (isOnlineArcadeGame(currentGame) && !onlineSharedDirty)) {
            localPlayer.score = remotePlayer.score || 0;
            localPlayer.powered = Boolean(remotePlayer.powered);
          }
          score = getPlayerTotalScore(localPlayer);
          scoreEl.textContent = score;
        }

        if (remoteState.playersState[otherSlot]) {
          const previousOther = onlineState.playersState[otherSlot];
          onlineState.playersState[otherSlot] = remoteState.playersState[otherSlot];

          if (currentGame === "online-tanks" && previousOther) {
            onlineState.playersState[otherSlot].renderX = previousOther.renderX ?? previousOther.x;
            onlineState.playersState[otherSlot].renderY = previousOther.renderY ?? previousOther.y;
          }
        }

        if (currentGame === "online-snake" && remoteState.foods && !onlineFoodsDirty) {
          if (!Array.isArray(room.foods) || room.foods.length < 4) {
            onlineFoodsDirty = true;
          }
          onlineState.foods = remoteState.foods;
          ensureOnlineSnakeFoods();
        }

        if (currentGame === "online-catcher" && remoteState.apples && !onlineApplesDirty) {
          if (!Array.isArray(room.apples) || room.apples.length < 4) {
            onlineApplesDirty = true;
          }
          onlineState.apples = remoteState.apples;
        }

        if (currentGame === "online-pong" && remoteState.ball && !onlinePongDirty) {
          onlineState.ball = remoteState.ball;
        }

        if (isOnlineArcadeGame(currentGame) && !onlineSharedDirty) {
          onlineState.ball = remoteState.ball || onlineState.ball;
          onlineState.tagger = remoteState.tagger || onlineState.tagger;
          onlineState.goal = remoteState.goal || onlineState.goal;
          onlineState.orb = remoteState.orb || onlineState.orb;
          onlineState.poweredSlot = remoteState.poweredSlot || "";
        }
      }

      function updateOnlineSnake() {
        ensureOnlineSnakeFoods();
        const player = onlineState.playersState[onlinePlayerSlot];

        if (!player?.alive) {
          return;
        }

        const now = Date.now();
        if (now - lastOnlineSnakeMove < 225) {
          return;
        }
        lastOnlineSnakeMove = now;

        player.dir = onlineDirection;
        const head = player.snake[0];
        const rawHead = {
          x: head.x + player.dir.x,
          y: head.y + player.dir.y
        };
        const nextHead = {
          x: (rawHead.x + tileCount) % tileCount,
          y: (rawHead.y + tileCount) % tileCount
        };
        const hitSelf = player.snake.some((part) => part.x === nextHead.x && part.y === nextHead.y);

        if (hitSelf) {
          player.alive = false;
          onlineLocalDirty = true;
          statusEl.textContent = "You crashed. Press Restart to rejoin.";
          return;
        }

        player.snake.unshift(nextHead);

        const eatenFoodIndex = onlineState.foods.findIndex(
          (foodItem) => nextHead.x === foodItem.x && nextHead.y === foodItem.y
        );

        if (eatenFoodIndex >= 0) {
          player.score += 1;
          onlineState.foods[eatenFoodIndex] = makeOnlineFood([
            ...getOnlineSnakeBlockedCells(),
            ...onlineState.foods.filter((_, index) => index !== eatenFoodIndex)
          ]);
          onlineFoodsDirty = true;
          onlineLocalDirty = true;
        } else {
          player.snake.pop();
          onlineLocalDirty = true;
        }

        score = getPlayerTotalScore(player);
        scoreEl.textContent = score;
        updateOnlineScoreboard();
      }

      function updateOnlineCatcher() {
        const player = onlineState.playersState[onlinePlayerSlot];

        if (!player?.alive) {
          return;
        }

        if (catcherMove !== 0) {
          player.x = Math.max(0, Math.min(canvas.width - 96, player.x + catcherMove * 9));
          onlineLocalDirty = true;
        }

        if (onlinePlayerSlot === "p1") {
          onlineState.apples = onlineState.apples.map((appleItem) => {
            const nextApple = {
              ...appleItem,
              y: appleItem.y + appleItem.speed
            };

            return nextApple.y > canvas.height ? makeOnlineApple() : nextApple;
          });
          onlineApplesDirty = true;
        }

        const caughtAppleIndex = onlineState.apples.findIndex(
          (appleItem) =>
            appleItem.y + appleItem.size >= player.y &&
            appleItem.y <= player.y + 18 &&
            appleItem.x + appleItem.size >= player.x &&
            appleItem.x <= player.x + 96
        );

        if (caughtAppleIndex >= 0) {
          player.score += 1;
          onlineState.apples[caughtAppleIndex] = makeOnlineApple();
          onlineApplesDirty = true;
          onlineLocalDirty = true;
        }

        score = getPlayerTotalScore(player);
        scoreEl.textContent = score;
        updateOnlineScoreboard();
      }

      function updateOnlinePong() {
        const player = onlineState.playersState[onlinePlayerSlot];
        const p1 = onlineState.playersState.p1;
        const p2 = onlineState.playersState.p2;

        if (!player || !p1 || !p2) {
          return;
        }

        if (pongMove !== 0) {
          player.y = Math.max(10, Math.min(canvas.height - player.height - 10, player.y + pongMove * 7.5));
          onlineLocalDirty = true;
        }

        if (onlinePlayerSlot !== "p1") {
          score = getPlayerTotalScore(player);
          scoreEl.textContent = score;
          return;
        }

        const ball = onlineState.ball || makeOnlinePongBall(1);
        ball.x += ball.dx;
        ball.y += ball.dy;

        if (ball.y - ball.size / 2 <= 0 || ball.y + ball.size / 2 >= canvas.height) {
          ball.dy *= -1;
          ball.y = Math.max(ball.size / 2, Math.min(canvas.height - ball.size / 2, ball.y));
        }

        const hitsPaddle = (paddle) =>
          ball.x + ball.size / 2 >= paddle.x &&
          ball.x - ball.size / 2 <= paddle.x + paddle.width &&
          ball.y + ball.size / 2 >= paddle.y &&
          ball.y - ball.size / 2 <= paddle.y + paddle.height;

        if (ball.dx < 0 && hitsPaddle(p1)) {
          ball.dx = Math.abs(ball.dx) + 0.15;
          ball.dy += ((ball.y - (p1.y + p1.height / 2)) / (p1.height / 2)) * 1.6;
          ball.x = p1.x + p1.width + ball.size / 2;
        }

        if (ball.dx > 0 && hitsPaddle(p2)) {
          ball.dx = -Math.abs(ball.dx) - 0.15;
          ball.dy += ((ball.y - (p2.y + p2.height / 2)) / (p2.height / 2)) * 1.6;
          ball.x = p2.x - ball.size / 2;
        }

        if (ball.x < -ball.size) {
          p2.score = (p2.score || 0) + 1;
          onlineState.ball = makeOnlinePongBall(-1);
        } else if (ball.x > canvas.width + ball.size) {
          p1.score = (p1.score || 0) + 1;
          onlineState.ball = makeOnlinePongBall(1);
        } else {
          onlineState.ball = ball;
        }

        onlinePongDirty = true;
        if ((p1.score || 0) >= 5 || (p2.score || 0) >= 5) {
          const winner = (p1.score || 0) >= 5 ? (p1.username || "P1") : (p2.username || "P2");
          statusEl.textContent = `${winner} wins. Press Restart for rematch.`;
          onlineState.ball = makeOnlinePongBall((p1.score || 0) >= 5 ? -1 : 1);
        }
        score = getPlayerTotalScore(player);
        scoreEl.textContent = score;
        updateOnlineScoreboard();
      }

      function updateOnlineArcade() {
        const player = onlineState.playersState[onlinePlayerSlot];
        const p1 = onlineState.playersState.p1;
        const p2 = onlineState.playersState.p2;

        if (!player || !p1 || !p2) {
          return;
        }

        if (onlineMove.x !== 0 || onlineMove.y !== 0) {
          const speed = currentGame === "online-racing" ? 5.5 : 4.8;
          moveOnlineArcadePlayer(player, onlineMove.x * speed, onlineMove.y * speed);
          onlineLocalDirty = true;
        }

        if (currentGame === "online-racing") {
          if (player.y < 32) {
            player.score = (player.score || 0) + 1;
            player.y = canvas.height - 54;
            player.x = onlinePlayerSlot === "p1" ? 200 : 320;
            onlineLocalDirty = true;
          }
        } else if (onlinePlayerSlot === "p1") {
          updateOnlineTagGame(p1, p2);
          updateOnlineSoccerGame(p1, p2);
          updateOnlineMazeGame(p1, p2);
          updateOnlineBattleGame(p1, p2);
        } else if (currentGame === "online-maze") {
          updateOnlineMazePlayer(player);
        }

        score = getPlayerTotalScore(player);
        scoreEl.textContent = score;
        updateOnlineScoreboard();
      }

      function moveOnlineArcadePlayer(player, dx, dy) {
        const size = player.size || 28;
        const nextX = Math.max(8, Math.min(canvas.width - size - 8, player.x + dx));
        const nextY = Math.max(8, Math.min(canvas.height - size - 8, player.y + dy));

        if (currentGame === "online-maze" && hitsMazeWall(nextX, player.y, size)) {
          player.y = nextY;
          return;
        }

        if (currentGame === "online-maze" && hitsMazeWall(nextX, nextY, size)) {
          return;
        }

        player.x = nextX;
        player.y = nextY;
      }

      function updateOnlineTagGame(p1, p2) {
        if (currentGame !== "online-tag") {
          return;
        }

        const taggerSlot = onlineState.tagger || "p1";
        const tagger = taggerSlot === "p1" ? p1 : p2;
        const runner = taggerSlot === "p1" ? p2 : p1;

        if (playersTouch(tagger, runner)) {
          tagger.score = (tagger.score || 0) + 1;
          onlineState.tagger = taggerSlot === "p1" ? "p2" : "p1";
          p1.x = 150;
          p1.y = canvas.height / 2;
          p2.x = canvas.width - 170;
          p2.y = canvas.height / 2;
          onlineSharedDirty = true;
        }
      }

      function updateOnlineSoccerGame(p1, p2) {
        if (currentGame !== "online-soccer") {
          return;
        }

        const ball = onlineState.ball || makeOnlineSoccerBall();
        [p1, p2].forEach((player) => {
          if (circleRectTouch(ball, player)) {
            const center = getPlayerCenter(player);
            const angle = Math.atan2(ball.y - center.y, ball.x - center.x);
            ball.dx += Math.cos(angle) * 2.2;
            ball.dy += Math.sin(angle) * 2.2;
          }
        });

        ball.x += ball.dx;
        ball.y += ball.dy;
        ball.dx *= 0.96;
        ball.dy *= 0.96;

        if (ball.y - ball.size / 2 < 0 || ball.y + ball.size / 2 > canvas.height) {
          ball.dy *= -1;
          ball.y = Math.max(ball.size / 2, Math.min(canvas.height - ball.size / 2, ball.y));
        }

        if (ball.x < 0) {
          p2.score = (p2.score || 0) + 1;
          onlineState.ball = makeOnlineSoccerBall();
        } else if (ball.x > canvas.width) {
          p1.score = (p1.score || 0) + 1;
          onlineState.ball = makeOnlineSoccerBall();
        } else {
          onlineState.ball = ball;
        }

        onlineSharedDirty = true;
      }

      function updateOnlineMazeGame(p1, p2) {
        if (currentGame !== "online-maze") {
          return;
        }

        updateOnlineMazePlayer(p1);
        updateOnlineMazePlayer(p2);
      }

      function updateOnlineMazePlayer(player) {
        if (!onlineState.goal) {
          onlineState.goal = makeOnlineMazeGoal();
        }

        if (rectsTouch(player.x, player.y, player.size || 28, player.size || 28, onlineState.goal.x, onlineState.goal.y, onlineState.goal.size, onlineState.goal.size)) {
          player.score = (player.score || 0) + 1;
          onlineState.goal = makeOnlineMazeGoal();
          player.x = player === onlineState.playersState.p1 ? 34 : 70;
          player.y = canvas.height - 52;
          onlineSharedDirty = true;
          onlineLocalDirty = true;
        }
      }

      function updateOnlineBattleGame(p1, p2) {
        if (currentGame !== "online-battle") {
          return;
        }

        onlineState.orb = onlineState.orb || makeOnlineArenaItem();
        [p1, p2].forEach((player, index) => {
          const slot = index === 0 ? "p1" : "p2";
          if (rectsTouch(player.x, player.y, player.size || 28, player.size || 28, onlineState.orb.x, onlineState.orb.y, onlineState.orb.size, onlineState.orb.size)) {
            onlineState.poweredSlot = slot;
            p1.powered = slot === "p1";
            p2.powered = slot === "p2";
            onlineState.orb = makeOnlineArenaItem();
            onlineSharedDirty = true;
          }
        });

        if (playersTouch(p1, p2) && onlineState.poweredSlot) {
          const powered = onlineState.poweredSlot === "p1" ? p1 : p2;
          powered.score = (powered.score || 0) + 1;
          onlineState.poweredSlot = "";
          p1.powered = false;
          p2.powered = false;
          p1.x = 120;
          p1.y = canvas.height / 2;
          p2.x = canvas.width - 140;
          p2.y = canvas.height / 2;
          onlineSharedDirty = true;
        }
      }

      function getPlayerCenter(player) {
        const size = player.size || 28;
        return {
          x: player.x + size / 2,
          y: player.y + size / 2
        };
      }

      function playersTouch(a, b) {
        return rectsTouch(a.x, a.y, a.size || 28, a.size || 28, b.x, b.y, b.size || 28, b.size || 28);
      }

      function rectsTouch(ax, ay, aw, ah, bx, by, bw, bh) {
        return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
      }

      function circleRectTouch(circle, rect) {
        const size = rect.size || 28;
        const nearestX = Math.max(rect.x, Math.min(circle.x, rect.x + size));
        const nearestY = Math.max(rect.y, Math.min(circle.y, rect.y + size));
        return Math.hypot(circle.x - nearestX, circle.y - nearestY) < circle.size / 2;
      }

      function getMazeWalls() {
        return [
          { x: 95, y: 78, width: 24, height: 330 },
          { x: 190, y: 0, width: 24, height: 270 },
          { x: 285, y: 150, width: 24, height: 330 },
          { x: 380, y: 0, width: 24, height: 280 },
          { x: 95, y: 408, width: 330, height: 24 },
          { x: 190, y: 270, width: 250, height: 24 }
        ];
      }

      function hitsMazeWall(x, y, size) {
        return getMazeWalls().some((wall) => rectsTouch(x, y, size, size, wall.x, wall.y, wall.width, wall.height));
      }

      function moveOnlineTank(player, speed) {
        player.x = Math.max(18, Math.min(canvas.width - 18, player.x + player.dir.x * speed));
        player.y = Math.max(18, Math.min(canvas.height - 18, player.y + player.dir.y * speed));
      }

      function shootOnlineTank() {
        if (currentGame !== "online-tanks" || paused || gameOver || !onlineState) {
          return;
        }

        const now = Date.now();
        if (now - lastTankShot < 380) {
          return;
        }

        const player = onlineState.playersState[onlinePlayerSlot];
        if (!player) {
          return;
        }

        lastTankShot = now;
        playSound("shoot");
        player.bullets = Array.isArray(player.bullets) ? player.bullets : [];
        player.bullets.push({
          x: player.x + player.dir.x * 22,
          y: player.y + player.dir.y * 22,
          dx: player.dir.x,
          dy: player.dir.y
        });
        onlineLocalDirty = true;
      }

      function updateOnlineTanks() {
        const player = onlineState.playersState[onlinePlayerSlot];
        const opponentSlot = onlinePlayerSlot === "p1" ? "p2" : "p1";
        const opponent = onlineState.playersState[opponentSlot];

        if (!player) {
          return;
        }

        if (tankMove !== 0) {
          moveOnlineTank(player, 4.2);
          onlineLocalDirty = true;
        }

        const bulletCountBefore = (player.bullets || []).length;
        player.bullets = (player.bullets || [])
          .map((bullet) => ({
            ...bullet,
            x: bullet.x + bullet.dx * 10,
            y: bullet.y + bullet.dy * 10
          }))
          .filter((bullet) => bullet.x > 0 && bullet.x < canvas.width && bullet.y > 0 && bullet.y < canvas.height);

        if (player.bullets.length || bulletCountBefore !== player.bullets.length) {
          onlineLocalDirty = true;
        }

        if (opponent) {
          player.bullets = player.bullets.filter((bullet) => {
            const hit = Math.abs(bullet.x - opponent.x) < 22 && Math.abs(bullet.y - opponent.y) < 22;

            if (hit) {
              player.score = (player.score || 0) + 1;
              onlineLocalDirty = true;
            }

            return !hit;
          });
        }

        score = getPlayerTotalScore(player);
        scoreEl.textContent = score;
        updateOnlineScoreboard();
      }

      function showLocalScoreboard() {
        localScoreboard.hidden = false;
        onlineScoreboard.hidden = true;
        updatePointsTargetOptions();
      }

      function showOnlineScoreboard() {
        localScoreboard.hidden = true;
        onlineScoreboard.hidden = false;
        updateOnlineScoreboard();
      }

      function updateOnlineScoreboard() {
        const playerOne = onlineState?.playersState?.p1;
        const playerTwo = onlineState?.playersState?.p2;

        playerOneNameEl.textContent = playerOne?.username || "P1";
        playerTwoNameEl.textContent = playerTwo?.username || "P2";
        playerOneScoreEl.textContent = getPlayerTotalScore(playerOne);
        playerTwoScoreEl.textContent = getPlayerTotalScore(playerTwo);
        updatePointsTargetOptions();
      }

      function getPlayerTotalScore(player) {
        return (player?.score || 0) + (player?.adminPoints || 0);
      }

      function updatePointsTargetOptions() {
        if (!pointsTargetSelect) {
          return;
        }

        const previousValue = pointsTargetSelect.value;
        pointsTargetSelect.innerHTML = "";

        if (onlineState?.playersState && currentGame.startsWith("online-")) {
          ["p1", "p2"].forEach((slot) => {
            const player = onlineState.playersState[slot];

            if (!player) {
              return;
            }

            const option = document.createElement("option");
            option.value = slot;
            option.textContent = player.username || slot.toUpperCase();
            pointsTargetSelect.appendChild(option);
          });
        }

        if (!pointsTargetSelect.options.length) {
          const option = document.createElement("option");
          option.value = "local";
          option.textContent = "Current game";
          pointsTargetSelect.appendChild(option);
        }

        const values = Array.from(pointsTargetSelect.options).map((option) => option.value);

        if (values.includes(previousValue)) {
          pointsTargetSelect.value = previousValue;
        } else if (values.includes(onlinePlayerSlot)) {
          pointsTargetSelect.value = onlinePlayerSlot;
        }
      }

      function drawOnlineGame() {
        drawBoard();

        if (!onlineState) {
          return;
        }

        if (currentGame === "online-snake") {
          drawOnlineSnake();
        } else if (currentGame === "online-tanks") {
          drawOnlineTanks();
        } else if (currentGame === "online-pong") {
          drawOnlinePong();
        } else if (isOnlineArcadeGame(currentGame)) {
          drawOnlineArcade();
        } else {
          drawOnlineCatcher();
        }
      }

      function drawOnlineSnake() {
        ensureOnlineSnakeFoods();
        if (onlineState.foods) {
          ctx.fillStyle = "#f97316";
          onlineState.foods.forEach((foodItem) => {
            roundTile(foodItem.x, foodItem.y, 7);
          });
        }

        drawOnlineSnakePlayer(onlineState.playersState.p1, "teal");
        drawOnlineSnakePlayer(onlineState.playersState.p2, "orange");
      }

      function drawOnlineSnakePlayer(player, fallbackColor) {
        if (!player?.snake) {
          return;
        }

        const theme = getTheme(player.color || fallbackColor);
        const skin = player.skin || "classic";

        player.snake.forEach((part, index) => {
          drawSnakeTile(part, index === 0 ? theme.head : theme.body, skin, index === 0);
        });
      }

      function drawOnlineCatcher() {
        if (onlineState.apples) {
          ctx.fillStyle = "#f97316";
          onlineState.apples.forEach((appleState) => {
            ctx.beginPath();
            ctx.arc(appleState.x, appleState.y, appleState.size, 0, Math.PI * 2);
            ctx.fill();
          });
        }

        drawOnlineCatcherPlayer(onlineState.playersState.p1, "teal");
        drawOnlineCatcherPlayer(onlineState.playersState.p2, "orange");
      }

      function drawOnlineCatcherPlayer(player, fallbackColor) {
        if (!player) {
          return;
        }

        const theme = getTheme(player.color || fallbackColor);

        ctx.fillStyle = theme.body;
        ctx.beginPath();
        ctx.roundRect(player.x, player.y, 96, 18, 8);
        ctx.fill();

        ctx.fillStyle = theme.head;
        ctx.beginPath();
        ctx.roundRect(player.x + 14, player.y - 12, 68, 14, 7);
        ctx.fill();
      }

      function drawOnlineTanks() {
        drawTankPlayer(onlineState.playersState.p1, "teal", "p1");
        drawTankPlayer(onlineState.playersState.p2, "orange", "p2");
      }

      function drawOnlinePong() {
        ctx.strokeStyle = "rgba(248, 250, 252, 0.16)";
        ctx.setLineDash([10, 10]);
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, 0);
        ctx.lineTo(canvas.width / 2, canvas.height);
        ctx.stroke();
        ctx.setLineDash([]);

        drawPongPlayer(onlineState.playersState.p1, "teal");
        drawPongPlayer(onlineState.playersState.p2, "orange");

        const ball = onlineState.ball;
        if (ball) {
          ctx.fillStyle = "#f8fafc";
          ctx.beginPath();
          ctx.arc(ball.x, ball.y, ball.size / 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawPongPlayer(player, fallbackColor) {
        if (!player) {
          return;
        }

        const theme = getTheme(player.color || fallbackColor);
        ctx.fillStyle = theme.body;
        ctx.beginPath();
        ctx.roundRect(player.x, player.y, player.width || 16, player.height || 84, 8);
        ctx.fill();
      }

      function drawOnlineArcade() {
        if (currentGame === "online-racing") {
          drawRacingTrack();
        } else if (currentGame === "online-soccer") {
          drawSoccerField();
        } else if (currentGame === "online-maze") {
          drawMazeField();
        } else if (currentGame === "online-battle") {
          drawBattleField();
        }

        if (currentGame === "online-soccer" && onlineState.ball) {
          ctx.fillStyle = "#f8fafc";
          ctx.beginPath();
          ctx.arc(onlineState.ball.x, onlineState.ball.y, onlineState.ball.size / 2, 0, Math.PI * 2);
          ctx.fill();
        }

        if (currentGame === "online-maze" && onlineState.goal) {
          drawDiamond(onlineState.goal.x, onlineState.goal.y, onlineState.goal.size, "#facc15");
        }

        if (currentGame === "online-battle" && onlineState.orb) {
          ctx.fillStyle = "#a78bfa";
          ctx.beginPath();
          ctx.arc(onlineState.orb.x + onlineState.orb.size / 2, onlineState.orb.y + onlineState.orb.size / 2, onlineState.orb.size / 2, 0, Math.PI * 2);
          ctx.fill();
        }

        drawArcadePlayer(onlineState.playersState.p1, "teal", "p1");
        drawArcadePlayer(onlineState.playersState.p2, "orange", "p2");
      }

      function drawArcadePlayer(player, fallbackColor, slot) {
        if (!player) {
          return;
        }

        const theme = getTheme(player.color || fallbackColor);
        const size = player.size || 28;
        const isTagger = currentGame === "online-tag" && (onlineState.tagger || "p1") === slot;
        const powered = currentGame === "online-battle" && onlineState.poweredSlot === slot;

        ctx.fillStyle = isTagger ? "#ef4444" : theme.body;
        if (powered) {
          ctx.shadowColor = "#a78bfa";
          ctx.shadowBlur = 16;
        }
        ctx.beginPath();
        ctx.roundRect(player.x, player.y, size, size, 8);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.fillStyle = theme.head;
        ctx.beginPath();
        ctx.arc(player.x + size / 2, player.y + size / 2, 6, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawRacingTrack() {
        ctx.fillStyle = "rgba(250, 204, 21, 0.9)";
        ctx.fillRect(0, 22, canvas.width, 8);
        ctx.strokeStyle = "rgba(248, 250, 252, 0.22)";
        ctx.lineWidth = 3;
        [170, 260, 350].forEach((x) => {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, canvas.height);
          ctx.stroke();
        });
      }

      function drawSoccerField() {
        ctx.strokeStyle = "rgba(94, 234, 212, 0.35)";
        ctx.lineWidth = 3;
        ctx.strokeRect(10, canvas.height / 2 - 70, 18, 140);
        ctx.strokeRect(canvas.width - 28, canvas.height / 2 - 70, 18, 140);
        ctx.beginPath();
        ctx.arc(canvas.width / 2, canvas.height / 2, 64, 0, Math.PI * 2);
        ctx.stroke();
      }

      function drawMazeField() {
        ctx.fillStyle = "rgba(248, 250, 252, 0.18)";
        getMazeWalls().forEach((wall) => {
          ctx.beginPath();
          ctx.roundRect(wall.x, wall.y, wall.width, wall.height, 6);
          ctx.fill();
        });
      }

      function drawBattleField() {
        ctx.strokeStyle = "rgba(167, 139, 250, 0.28)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(canvas.width / 2, canvas.height / 2, 120, 0, Math.PI * 2);
        ctx.stroke();
      }

      function drawDiamond(x, y, size, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(x + size / 2, y);
        ctx.lineTo(x + size, y + size / 2);
        ctx.lineTo(x + size / 2, y + size);
        ctx.lineTo(x, y + size / 2);
        ctx.closePath();
        ctx.fill();
      }

      function drawTankPlayer(player, fallbackColor, slot) {
        if (!player) {
          return;
        }

        const theme = getTheme(player.color || fallbackColor);
        const isLocalPlayer = slot === onlinePlayerSlot;
        let drawX = player.x;
        let drawY = player.y;

        if (!isLocalPlayer) {
          player.renderX = player.renderX ?? player.x;
          player.renderY = player.renderY ?? player.y;
          player.renderX += (player.x - player.renderX) * 0.35;
          player.renderY += (player.y - player.renderY) * 0.35;
          drawX = player.renderX;
          drawY = player.renderY;
        }

        ctx.fillStyle = theme.body;
        ctx.beginPath();
        ctx.roundRect(drawX - 18, drawY - 18, 36, 36, 7);
        ctx.fill();

        ctx.strokeStyle = theme.head;
        ctx.lineWidth = 8;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(drawX, drawY);
        ctx.lineTo(drawX + player.dir.x * 28, drawY + player.dir.y * 28);
        ctx.stroke();

        ctx.fillStyle = theme.head;
        (player.bullets || []).forEach((bullet) => {
          ctx.beginPath();
          ctx.arc(bullet.x, bullet.y, 5, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      async function createRoom() {
        createRoomButton.disabled = true;
        joinRoomButton.disabled = true;
        roomCodeEl.textContent = "";
        roomNoteEl.textContent = `Creating ${onlineGameNames[selectedOnlineGame]} room...`;

        try {
          const code = await generateRoomCode();
          const room = {
            players: 1,
            game: selectedOnlineGame,
            gameName: onlineGameNames[selectedOnlineGame],
            createdBy: playerId,
            joinedBy: null,
            createdAt: Date.now(),
            playersState: {
              p1: makeOnlinePlayer("p1", selectedOnlineGame)
            },
            foods: null,
            apples: selectedOnlineGame === "online-catcher" ? makeOnlineApples() : null,
            ball: selectedOnlineGame === "online-pong"
              ? makeOnlinePongBall(1)
              : selectedOnlineGame === "online-soccer"
                ? makeOnlineSoccerBall()
                : null,
            tagger: selectedOnlineGame === "online-tag" ? "p1" : null,
            goal: selectedOnlineGame === "online-maze" ? makeOnlineMazeGoal() : null,
            orb: selectedOnlineGame === "online-battle" ? makeOnlineArenaItem() : null,
            poweredSlot: ""
          };

          if (selectedOnlineGame === "online-snake") {
            room.foods = makeOnlineFoods(room);
          }

          await saveRoom(code, room);
          createdRoomCode = code;
          saveOwnedRoomCode(code);
          roomCodeInput.value = code;
          roomCodeEl.textContent = `Room code: ${code}`;
          roomNoteEl.textContent = `${room.gameName} selected. Share this code with player 2.`;
          waitForSecondPlayer(code, selectedOnlineGame, room);
        } catch {
          roomCodeEl.textContent = "";
          roomNoteEl.textContent = "Could not create room. Check Firebase database rules.";
        } finally {
          createRoomButton.disabled = false;
          joinRoomButton.disabled = false;
        }
      }

      async function joinRoom() {
        const code = roomCodeInput.value.trim().toUpperCase();

        if (!code) {
          roomCodeEl.textContent = "";
          roomNoteEl.textContent = "Enter a room code first.";
          return;
        }

        if (code === createdRoomCode || getOwnedRoomCodes().includes(code)) {
          roomCodeEl.textContent = `Room code: ${code}`;
          roomNoteEl.textContent = "You created this room. A different player must join it.";
          return;
        }

        createRoomButton.disabled = true;
        joinRoomButton.disabled = true;
        roomCodeEl.textContent = "";
        roomNoteEl.textContent = "Joining room...";

        try {
          const room = await getRoom(code);

          if (!room) {
            roomCodeEl.textContent = "";
            roomNoteEl.textContent = "Room not found. Check the code from player 1.";
            return;
          }

          if (room.createdBy === playerId) {
            roomCodeEl.textContent = `Room code: ${code}`;
            roomNoteEl.textContent = "You created this room. A different player must join it.";
            return;
          }

          if (room.players >= 2) {
            roomCodeEl.textContent = `Room code: ${code}`;
            roomNoteEl.textContent = "This room is already full.";
            return;
          }

          const joinedRoom = {
            ...room,
            players: 2,
            playersState: {
              ...(room.playersState || {}),
              p2: makeOnlinePlayer("p2", room.game || "online-snake")
            },
            joinedBy: playerId,
            joinedAt: Date.now()
          };

          await saveRoom(code, joinedRoom);
          roomCodeEl.textContent = `Joined room: ${code}`;
          roomNoteEl.textContent = `Joined ${room.gameName || "online game"}. Online match setup is ready.`;
          await beginOnlineRoom(code, room.game || "online-snake", "p2", joinedRoom);
        } catch {
          roomCodeEl.textContent = "";
          roomNoteEl.textContent = "Could not join room. Check Firebase database rules.";
        } finally {
          createRoomButton.disabled = false;
          joinRoomButton.disabled = false;
        }
      }

      function clearRoomMessage() {
        roomCodeEl.textContent = "";
        roomNoteEl.textContent = "";
      }

      function updateOnlineGameSelection() {
        onlineGameButtons.forEach((button) => {
          button.classList.toggle("selected", button.dataset.onlineGame === selectedOnlineGame);
        });
      }

      restartButton.addEventListener("click", resetGame);

      cancelWaitButton.addEventListener("click", leaveOnlineRoom);
      shootButton.addEventListener("click", shootOnlineTank);
      loginButton.addEventListener("click", loginAccount);
      registerButton.addEventListener("click", registerAccount);
      saveGmailButton.addEventListener("click", () => saveAccountGmail("account"));
      sendRecoveryEmailButton.addEventListener("click", () => sendPasswordRecoveryEmail("account"));
      settingsSaveGmailButton.addEventListener("click", () => saveAccountGmail("settings"));
      settingsSendRecoveryEmailButton.addEventListener("click", () => sendPasswordRecoveryEmail("settings"));
      accountBackButton.addEventListener("click", closeAccountSettings);
      logoutButton.addEventListener("click", () => {
        firebaseAuth.signOut();
        gmailInput.value = "";
        changeGmailInput.value = "";
        settingsGmailInput.value = "";
        settingsCurrentPasswordInput.value = "";

      });
      refreshAdminButton.addEventListener("click", loadAdminPanel);
      clearRoomsButton.addEventListener("click", clearAllRooms);
      addPointsButton.addEventListener("click", addAdminPoint);
      soundSelect.addEventListener("change", updateGameSettings);
      themeSelect.addEventListener("change", updateGameSettings);
      fieldSizeSelect.addEventListener("change", updateGameSettings);
      controlsSelect.addEventListener("change", updateGameSettings);
      skinSelect.addEventListener("change", updatePlayerStyle);
      colorSelect.addEventListener("change", updatePlayerStyle);
      resetRecordButton.addEventListener("click", resetCurrentRecord);
      accountSettingsButton.addEventListener("click", openAccountSettings);
      passwordInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          loginAccount();
        }
      });
      pauseButton.addEventListener("click", togglePause);
      resumeButton.addEventListener("click", togglePause);
      leaveRoomButton.addEventListener("click", leaveOnlineRoom);
      gamesButton.addEventListener("click", () => {
        showGameModeMenu();
      });
      settingsButton.addEventListener("click", () => {
        showSettingsMenu();
      });
      singlePlayerButton.addEventListener("click", () => {
        showGameList("single");
      });
      onlineButton.addEventListener("click", () => {
        showGameList("online");
      });
      snakeClassicButton.addEventListener("click", () => {
        startGame("snake");
      });
      appleCatcherButton.addEventListener("click", () => {
        startGame("catcher");
      });
      dodgeBlocksButton.addEventListener("click", () => {
        startGame("dodger");
      });
      onlineGameButtons.forEach((button) => {
        button.addEventListener("click", () => {
          selectedOnlineGame = button.dataset.onlineGame;
          updateOnlineGameSelection();
          clearRoomMessage();
        });
      });
      createRoomButton.addEventListener("click", createRoom);
      joinRoomButton.addEventListener("click", joinRoom);
      roomCodeInput.addEventListener("input", () => {
        roomCodeInput.value = roomCodeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
      });
      backButton.addEventListener("click", () => {
        if (pauseMenuLevel === "single" || pauseMenuLevel === "online") {
          showGameModeMenu();
        } else {
          resetPauseMenu();
        }
      });

      refreshStoredAccountRole();
      applyPlayerStyleControls();
      applyGameSettingsControls();
      startGame("snake");
    </script>
