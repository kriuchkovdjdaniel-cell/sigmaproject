<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Snake - Danya</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, Helvetica, sans-serif;
        background: #111827;
        color: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(20, 184, 166, 0.28), transparent 32rem),
          linear-gradient(135deg, #111827 0%, #172033 55%, #0f172a 100%);
      }

      main {
        width: min(92vw, 620px);
        display: grid;
        gap: 1rem;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 1rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 9vw, 4.5rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .scoreboard {
        display: flex;
        gap: 0.75rem;
        font-weight: 700;
      }

      .stat {
        min-width: 5rem;
        padding: 0.65rem 0.75rem;
        border: 1px solid rgba(248, 250, 252, 0.2);
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.72);
        text-align: center;
      }

      .stat span {
        display: block;
        margin-top: 0.15rem;
        color: #5eead4;
        font-size: 1.35rem;
      }

      .game {
        display: grid;
        gap: 0.9rem;
      }

      canvas {
        width: 100%;
        aspect-ratio: 1;
        display: block;
        border: 2px solid rgba(248, 250, 252, 0.22);
        border-radius: 8px;
        background: #020617;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
      }

      .controls {
        display: flex;
        justify-content: space-between;
        gap: 0.75rem;
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 8px;
        padding: 0.7rem 0.95rem;
        background: #14b8a6;
        color: #042f2e;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
      }

      button:hover {
        background: #2dd4bf;
      }

      .pad {
        width: min(72vw, 240px);
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.45rem;
      }

      .pad button {
        aspect-ratio: 1.25;
        padding: 0;
        background: rgba(248, 250, 252, 0.12);
        color: #f8fafc;
      }

      .pad button:hover {
        background: rgba(248, 250, 252, 0.2);
      }

      .pad .up {
        grid-column: 2;
      }

      .pad .left {
        grid-column: 1;
      }

      .pad .down {
        grid-column: 2;
      }

      .pad .right {
        grid-column: 3;
      }

      .status {
        min-height: 1.5rem;
        margin: 0;
        color: #cbd5e1;
        text-align: center;
        font-weight: 700;
      }

      .pause-menu {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 1rem;
        background: rgba(2, 6, 23, 0.74);
        opacity: 0;
        pointer-events: none;
        transition: opacity 160ms ease;
      }

      .pause-menu.open {
        opacity: 1;
        pointer-events: auto;
      }

      .pause-panel {
        width: min(88vw, 320px);
        display: grid;
        gap: 0.75rem;
        padding: 1rem;
        border: 1px solid rgba(248, 250, 252, 0.18);
        border-radius: 8px;
        background: #111827;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
      }

      .pause-panel h2 {
        margin: 0 0 0.25rem;
        font-size: 1.5rem;
        text-align: center;
      }

      .game-options {
        display: none;
        gap: 0.75rem;
      }

      .game-options.open {
        display: grid;
      }

      .game-list {
        display: none;
        gap: 0.75rem;
      }

      .game-list.open {
        display: grid;
      }

      .room-form {
        display: grid;
        gap: 0.75rem;
      }

      input {
        width: 100%;
        min-height: 44px;
        border: 1px solid rgba(248, 250, 252, 0.22);
        border-radius: 8px;
        padding: 0.7rem 0.95rem;
        background: #020617;
        color: #f8fafc;
        font: inherit;
        font-weight: 700;
        text-align: center;
        text-transform: uppercase;
      }

      .room-code {
        min-height: 1.4rem;
        margin: 0;
        color: #5eead4;
        text-align: center;
        font-weight: 800;
      }

      .room-note {
        min-height: 1.4rem;
        margin: 0;
        color: #cbd5e1;
        text-align: center;
        font-size: 0.95rem;
        font-weight: 700;
      }

      @media (max-width: 560px) {
        header {
          align-items: stretch;
          flex-direction: column;
        }

        .scoreboard {
          justify-content: space-between;
        }

        .stat {
          flex: 1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1 id="gameTitle">Snake</h1>
        <div class="scoreboard" aria-label="Scoreboard">
          <div class="stat">Score <span id="score">0</span></div>
          <div class="stat">Best <span id="best">0</span></div>
        </div>
      </header>

      <section class="game" aria-label="Snake game">
        <canvas id="board" width="560" height="560"></canvas>
        <p class="status" id="status">Use arrow keys or WASD to play.</p>
        <div class="controls">
          <button type="button" id="restart">Restart</button>
          <button type="button" id="pause">Pause</button>
        </div>
        <div class="pad" aria-label="Touch controls">
          <button type="button" class="up" data-direction="up" aria-label="Move up">Up</button>
          <button type="button" class="left" data-direction="left" aria-label="Move left">Left</button>
          <button type="button" class="down" data-direction="down" aria-label="Move down">Down</button>
          <button type="button" class="right" data-direction="right" aria-label="Move right">Right</button>
        </div>
      </section>
    </main>

    <div class="pause-menu" id="pauseMenu" aria-hidden="true">
      <div class="pause-panel" role="dialog" aria-modal="true" aria-labelledby="pauseTitle">
        <h2 id="pauseTitle">Paused</h2>
        <button type="button" id="resume">Resume</button>
        <button type="button" id="back" hidden>Back</button>
        <button type="button" id="games">Games</button>
        <div class="game-options" id="gameOptions" aria-label="Game modes">
          <button type="button" id="singlePlayer">Single Player</button>
          <button type="button" id="online">Online</button>
        </div>
        <div class="game-list" id="singlePlayerGames" aria-label="Single player games">
          <button type="button" id="snakeClassic">Snake Classic</button>
          <button type="button" id="appleCatcher">Apple Catcher</button>
        </div>
        <div class="game-list" id="onlineGames" aria-label="Online games">
          <button type="button" id="createRoom">Create Room</button>
          <div class="room-form">
            <input id="roomCodeInput" type="text" maxlength="8" placeholder="Room code" aria-label="Room code">
            <button type="button" id="joinRoom">Join Room</button>
          </div>
          <p class="room-code" id="roomCode"></p>
          <p class="room-note" id="roomNote"></p>
        </div>
      </div>
    </div>

    <script>
      const canvas = document.getElementById("board");
      const ctx = canvas.getContext("2d");
      const gameTitle = document.getElementById("gameTitle");
      const scoreEl = document.getElementById("score");
      const bestEl = document.getElementById("best");
      const statusEl = document.getElementById("status");
      const restartButton = document.getElementById("restart");
      const pauseButton = document.getElementById("pause");
      const pauseMenu = document.getElementById("pauseMenu");
      const resumeButton = document.getElementById("resume");
      const backButton = document.getElementById("back");
      const gamesButton = document.getElementById("games");
      const gameOptions = document.getElementById("gameOptions");
      const singlePlayerButton = document.getElementById("singlePlayer");
      const onlineButton = document.getElementById("online");
      const singlePlayerGames = document.getElementById("singlePlayerGames");
      const onlineGames = document.getElementById("onlineGames");
      const snakeClassicButton = document.getElementById("snakeClassic");
      const appleCatcherButton = document.getElementById("appleCatcher");
      const createRoomButton = document.getElementById("createRoom");
      const joinRoomButton = document.getElementById("joinRoom");
      const roomCodeInput = document.getElementById("roomCodeInput");
      const roomCodeEl = document.getElementById("roomCode");
      const roomNoteEl = document.getElementById("roomNote");
      const gridSize = 20;
      const tileCount = canvas.width / gridSize;
      const startSnake = [
        { x: 8, y: 10 },
        { x: 7, y: 10 },
        { x: 6, y: 10 }
      ];
      const games = {
        snake: {
          title: "Snake",
          bestKey: "snake-best",
          help: "Use arrow keys or WASD to play."
        },
        catcher: {
          title: "Apple Catcher",
          bestKey: "catcher-best",
          help: "Use Left/Right or A/D to catch apples."
        }
      };

      let currentGame = "snake";
      let snake;
      let food;
      let direction;
      let nextDirection;
      let catcher;
      let apple;
      let catcherMove = 0;
      let score;
      let best;
      let gameOver;
      let paused;
      let timer;
      let pauseMenuLevel = "main";
      const firebaseDatabaseUrl = "https://fir-a3f0a-default-rtdb.firebaseio.com";
      const playerStorageKey = "snake-online-player-id";
      const ownedRoomsStorageKey = "snake-owned-room-codes";
      const playerId = getPlayerId();
      let createdRoomCode = "";

      function startGame(gameName) {
        currentGame = gameName;
        gameTitle.textContent = games[currentGame].title;
        best = Number(localStorage.getItem(games[currentGame].bestKey) || 0);
        bestEl.textContent = best;
        resetGame();
      }

      function resetGame() {
        score = 0;
        gameOver = false;
        paused = false;
        scoreEl.textContent = score;
        pauseButton.textContent = "Pause";
        pauseMenu.classList.remove("open");
        pauseMenu.setAttribute("aria-hidden", "true");
        resetPauseMenu();
        statusEl.textContent = games[currentGame].help;
        clearInterval(timer);

        if (currentGame === "snake") {
          resetSnake();
          timer = setInterval(tickSnake, 115);
        } else {
          resetCatcher();
          timer = setInterval(tickCatcher, 28);
        }

        draw();
      }

      function resetSnake() {
        snake = startSnake.map((part) => ({ ...part }));
        direction = { x: 1, y: 0 };
        nextDirection = { x: 1, y: 0 };
        placeFood();
      }

      function resetCatcher() {
        catcherMove = 0;
        catcher = {
          x: canvas.width / 2 - 48,
          y: canvas.height - 44,
          width: 96,
          height: 18
        };
        resetApple();
      }

      function resetApple() {
        apple = {
          x: 20 + Math.random() * (canvas.width - 40),
          y: -24,
          size: 18,
          speed: 3.7 + Math.min(score * 0.16, 5)
        };
      }

      function placeFood() {
        do {
          food = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)
          };
        } while (snake.some((part) => part.x === food.x && part.y === food.y));
      }

      function changeDirection(newDirection) {
        if (currentGame === "catcher") {
          if (newDirection.x !== 0) {
            catcherMove = newDirection.x;
            moveCatcher(catcherMove);
          }
          return;
        }

        const reversing =
          newDirection.x + direction.x === 0 &&
          newDirection.y + direction.y === 0;

        if (!reversing) {
          nextDirection = newDirection;
        }
      }

      function moveCatcher(amount) {
        if (paused || gameOver) {
          return;
        }
        catcher.x = Math.max(0, Math.min(canvas.width - catcher.width, catcher.x + amount * 9));
        draw();
      }

      function tickSnake() {
        if (paused || gameOver) {
          return;
        }

        direction = nextDirection;
        const head = {
          x: snake[0].x + direction.x,
          y: snake[0].y + direction.y
        };

        const hitWall =
          head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount;
        const hitSelf = snake.some((part) => part.x === head.x && part.y === head.y);

        if (hitWall || hitSelf) {
          endGame();
          return;
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
          addPoint();
          placeFood();
        } else {
          snake.pop();
        }

        draw();
      }

      function tickCatcher() {
        if (paused || gameOver) {
          return;
        }

        if (catcherMove !== 0) {
          moveCatcher(catcherMove);
        }

        apple.y += apple.speed;
        const caught =
          apple.y + apple.size >= catcher.y &&
          apple.y <= catcher.y + catcher.height &&
          apple.x + apple.size >= catcher.x &&
          apple.x <= catcher.x + catcher.width;

        if (caught) {
          addPoint();
          resetApple();
        } else if (apple.y > canvas.height) {
          endGame();
          return;
        }

        draw();
      }

      function addPoint() {
        score += 1;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem(games[currentGame].bestKey, String(best));
        }
      }

      function endGame() {
        gameOver = true;
        pauseMenu.classList.remove("open");
        pauseMenu.setAttribute("aria-hidden", "true");
        resetPauseMenu();
        statusEl.textContent = "Game over. Press Restart to play again.";
        draw();
      }

      function draw() {
        drawBoard();
        if (currentGame === "snake") {
          drawSnake();
        } else {
          drawCatcher();
        }
      }

      function drawBoard() {
        ctx.fillStyle = "#020617";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = "rgba(148, 163, 184, 0.12)";
        ctx.lineWidth = 1;
        for (let line = 0; line <= tileCount; line += 1) {
          const position = line * gridSize;
          ctx.beginPath();
          ctx.moveTo(position, 0);
          ctx.lineTo(position, canvas.height);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, position);
          ctx.lineTo(canvas.width, position);
          ctx.stroke();
        }
      }

      function drawSnake() {
        ctx.fillStyle = "#f97316";
        roundTile(food.x, food.y, 7);

        snake.forEach((part, index) => {
          ctx.fillStyle = index === 0 ? "#5eead4" : "#14b8a6";
          roundTile(part.x, part.y, 5);
        });
      }

      function drawCatcher() {
        ctx.fillStyle = "#f97316";
        ctx.beginPath();
        ctx.arc(apple.x, apple.y, apple.size, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#14b8a6";
        ctx.beginPath();
        ctx.roundRect(catcher.x, catcher.y, catcher.width, catcher.height, 8);
        ctx.fill();

        ctx.fillStyle = "#5eead4";
        ctx.beginPath();
        ctx.roundRect(catcher.x + 14, catcher.y - 12, catcher.width - 28, 14, 7);
        ctx.fill();
      }

      function roundTile(x, y, radius) {
        const inset = 2;
        const left = x * gridSize + inset;
        const top = y * gridSize + inset;
        const size = gridSize - inset * 2;

        ctx.beginPath();
        ctx.roundRect(left, top, size, size, radius);
        ctx.fill();
      }

      document.addEventListener("keydown", (event) => {
        const keys = {
          ArrowUp: { x: 0, y: -1 },
          w: { x: 0, y: -1 },
          W: { x: 0, y: -1 },
          ArrowDown: { x: 0, y: 1 },
          s: { x: 0, y: 1 },
          S: { x: 0, y: 1 },
          ArrowLeft: { x: -1, y: 0 },
          a: { x: -1, y: 0 },
          A: { x: -1, y: 0 },
          ArrowRight: { x: 1, y: 0 },
          d: { x: 1, y: 0 },
          D: { x: 1, y: 0 }
        };

        if (keys[event.key]) {
          event.preventDefault();
          changeDirection(keys[event.key]);
        }

        if (event.key === " ") {
          event.preventDefault();
          togglePause();
        }
      });

      document.addEventListener("keyup", (event) => {
        if (currentGame !== "catcher") {
          return;
        }

        const leftReleased = ["ArrowLeft", "a", "A"].includes(event.key) && catcherMove < 0;
        const rightReleased = ["ArrowRight", "d", "D"].includes(event.key) && catcherMove > 0;

        if (leftReleased || rightReleased) {
          catcherMove = 0;
        }
      });

      document.querySelectorAll("[data-direction]").forEach((button) => {
        const directions = {
          up: { x: 0, y: -1 },
          down: { x: 0, y: 1 },
          left: { x: -1, y: 0 },
          right: { x: 1, y: 0 }
        };

        button.addEventListener("click", () => {
          if (currentGame === "catcher") {
            return;
          }
          changeDirection(directions[button.dataset.direction]);
        });

        button.addEventListener("pointerdown", (event) => {
          if (currentGame !== "catcher") {
            return;
          }

          const direction = directions[button.dataset.direction];
          if (direction.x !== 0) {
            event.preventDefault();
            catcherMove = direction.x;
            button.setPointerCapture(event.pointerId);
          }
        });

        button.addEventListener("pointerup", () => {
          if (currentGame === "catcher") {
            catcherMove = 0;
          }
        });

        button.addEventListener("pointercancel", () => {
          if (currentGame === "catcher") {
            catcherMove = 0;
          }
        });
      });

      function togglePause() {
        if (gameOver) {
          return;
        }
        paused = !paused;
        pauseButton.textContent = paused ? "Resume" : "Pause";
        pauseMenu.classList.toggle("open", paused);
        pauseMenu.setAttribute("aria-hidden", String(!paused));
        resetPauseMenu();
        statusEl.textContent = paused ? "Paused." : games[currentGame].help;
      }

      function resetPauseMenu() {
        pauseMenuLevel = "main";
        resumeButton.hidden = false;
        backButton.hidden = true;
        gamesButton.hidden = false;
        gameOptions.classList.remove("open");
        singlePlayerGames.classList.remove("open");
        onlineGames.classList.remove("open");
      }

      function showGameModeMenu() {
        pauseMenuLevel = "modes";
        resumeButton.hidden = true;
        backButton.hidden = false;
        gamesButton.hidden = true;
        gameOptions.classList.add("open");
        singlePlayerGames.classList.remove("open");
        onlineGames.classList.remove("open");
      }

      function showGameList(list) {
        pauseMenuLevel = list;
        resumeButton.hidden = true;
        backButton.hidden = false;
        gamesButton.hidden = true;
        gameOptions.classList.remove("open");
        singlePlayerGames.classList.toggle("open", list === "single");
        onlineGames.classList.toggle("open", list === "online");
        if (list === "online") {
          clearRoomMessage();
        }
      }

      async function getRoom(code) {
        const response = await fetch(`${firebaseDatabaseUrl}/rooms/${code}.json`);

        if (!response.ok) {
          throw new Error("Could not reach room server.");
        }

        return response.json();
      }

      async function saveRoom(code, room) {
        const response = await fetch(`${firebaseDatabaseUrl}/rooms/${code}.json`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(room)
        });

        if (!response.ok) {
          throw new Error("Could not save room.");
        }

        return response.json();
      }

      function getPlayerId() {
        let id = "";

        try {
          id = localStorage.getItem(playerStorageKey);
        } catch {
          id = "";
        }

        if (!id) {
          id = `PLAYER-${Math.random().toString(36).slice(2, 10).toUpperCase()}`;
          try {
            localStorage.setItem(playerStorageKey, id);
          } catch {
            // The in-memory id still works until the page reloads.
          }
        }

        return id;
      }

      function getOwnedRoomCodes() {
        try {
          return JSON.parse(localStorage.getItem(ownedRoomsStorageKey) || "[]");
        } catch {
          return [];
        }
      }

      function saveOwnedRoomCode(code) {
        const ownedCodes = getOwnedRoomCodes();

        if (!ownedCodes.includes(code)) {
          ownedCodes.push(code);
        }

        try {
          localStorage.setItem(ownedRoomsStorageKey, JSON.stringify(ownedCodes));
        } catch {
          // Same-session createdRoomCode still prevents joining your own room.
        }
      }

      async function generateRoomCode() {
        let code;
        let existingRoom;

        do {
          code = `CODE${Math.floor(1000 + Math.random() * 9000)}`;
          existingRoom = await getRoom(code);
        } while (existingRoom);

        return code;
      }

      async function createRoom() {
        createRoomButton.disabled = true;
        joinRoomButton.disabled = true;
        roomCodeEl.textContent = "";
        roomNoteEl.textContent = "Creating room...";

        try {
          const code = await generateRoomCode();
          const room = {
            players: 1,
            createdBy: playerId,
            joinedBy: null,
            createdAt: Date.now()
          };

          await saveRoom(code, room);
          createdRoomCode = code;
          saveOwnedRoomCode(code);
          roomCodeInput.value = code;
          roomCodeEl.textContent = `Room code: ${code}`;
          roomNoteEl.textContent = "Share this code with player 2.";
        } catch {
          roomCodeEl.textContent = "";
          roomNoteEl.textContent = "Could not create room. Check Firebase database rules.";
        } finally {
          createRoomButton.disabled = false;
          joinRoomButton.disabled = false;
        }
      }

      async function joinRoom() {
        const code = roomCodeInput.value.trim().toUpperCase();

        if (!code) {
          roomCodeEl.textContent = "";
          roomNoteEl.textContent = "Enter a room code first.";
          return;
        }

        if (code === createdRoomCode || getOwnedRoomCodes().includes(code)) {
          roomCodeEl.textContent = `Room code: ${code}`;
          roomNoteEl.textContent = "You created this room. A different player must join it.";
          return;
        }

        createRoomButton.disabled = true;
        joinRoomButton.disabled = true;
        roomCodeEl.textContent = "";
        roomNoteEl.textContent = "Joining room...";

        try {
          const room = await getRoom(code);

          if (!room) {
            roomCodeEl.textContent = "";
            roomNoteEl.textContent = "Room not found. Check the code from player 1.";
            return;
          }

          if (room.createdBy === playerId) {
            roomCodeEl.textContent = `Room code: ${code}`;
            roomNoteEl.textContent = "You created this room. A different player must join it.";
            return;
          }

          if (room.players >= 2) {
            roomCodeEl.textContent = `Room code: ${code}`;
            roomNoteEl.textContent = "This room is already full.";
            return;
          }

          await saveRoom(code, {
            ...room,
            players: 2,
            joinedBy: playerId,
            joinedAt: Date.now()
          });
          roomCodeEl.textContent = `Joined room: ${code}`;
          roomNoteEl.textContent = "Player 2 joined. Online match setup is ready.";
        } catch {
          roomCodeEl.textContent = "";
          roomNoteEl.textContent = "Could not join room. Check Firebase database rules.";
        } finally {
          createRoomButton.disabled = false;
          joinRoomButton.disabled = false;
        }
      }

      function clearRoomMessage() {
        roomCodeEl.textContent = "";
        roomNoteEl.textContent = "";
      }

      restartButton.addEventListener("click", resetGame);
      pauseButton.addEventListener("click", togglePause);
      resumeButton.addEventListener("click", togglePause);
      gamesButton.addEventListener("click", () => {
        showGameModeMenu();
      });
      singlePlayerButton.addEventListener("click", () => {
        showGameList("single");
      });
      onlineButton.addEventListener("click", () => {
        showGameList("online");
      });
      snakeClassicButton.addEventListener("click", () => {
        startGame("snake");
      });
      appleCatcherButton.addEventListener("click", () => {
        startGame("catcher");
      });
      createRoomButton.addEventListener("click", createRoom);
      joinRoomButton.addEventListener("click", joinRoom);
      roomCodeInput.addEventListener("input", () => {
        roomCodeInput.value = roomCodeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
      });
      backButton.addEventListener("click", () => {
        if (pauseMenuLevel === "single" || pauseMenuLevel === "online") {
          showGameModeMenu();
        } else {
          resetPauseMenu();
        }
      });

      startGame("snake");
    </script>
  </body>
</html>
