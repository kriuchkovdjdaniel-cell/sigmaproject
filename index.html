<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hi Danya</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f4ee;
        color: #1f2933;
      }

      main {
        width: min(90vw, 720px);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 12vw, 7rem);
        font-weight: 800;
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 1.25rem 0 0;
        font-size: clamp(1.5rem, 5vw, 3rem);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hi Danya</h1>
      <p>sigmaboy danya</p>
    </main>
  </body>
</html>
